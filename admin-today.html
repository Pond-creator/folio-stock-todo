<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - งานวันนี้</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs">
    <a href="admin-today.html" class="tab-link active">📋 งานวันนี้</a>
    <a href="admin-summary.html" class="tab-link">📊 สรุปผล</a>
    <a href="admin-assign.html" class="tab-link">📝 มอบหมายงาน</a>
    <a href="admin-base.html" class="tab-link">⚙️ จัดการระบบ</a>
  </div>

  <div class="main">
    <!-- stat cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card blue"><div class="stat-label">งานทั้งหมด</div><div class="stat-value" id="sTotal">-</div></div>
      <div class="stat-card amber"><div class="stat-label">กำลังดำเนินการ</div><div class="stat-value" id="sPending">-</div></div>
      <div class="stat-card green"><div class="stat-label">เสร็จแล้ว</div><div class="stat-value" id="sDone">-</div></div>
      <div class="stat-card red"><div class="stat-label">ใกล้ Deadline</div><div class="stat-value" id="sNear">-</div></div>
    </div>

    <!-- near deadline alert -->
    <div id="nearAlert"></div>

    <!-- filter -->
    <div class="card mb-24">
      <div class="card-header">
        <span class="card-title">📋 งานที่ยังไม่เสร็จทั้งหมด</span>
        <div class="flex-gap">
          <button class="btn btn-outline btn-sm" onclick="loadAll()">🔄 รีเฟรช</button>
          <button class="btn btn-primary btn-sm" onclick="location.href='admin-assign.html'">＋ มอบหมายงาน</button>
        </div>
      </div>
      <div class="card-body" style="padding-top:12px;padding-bottom:12px">
        <div class="filter-bar">
          <select id="filterPerson" onchange="applyFilter()">
            <option value="">ทุกคน</option>
          </select>
          <select id="filterType" onchange="applyFilter()">
            <option value="">ทุกประเภท</option>
          </select>
          <select id="filterPriority" onchange="applyFilter()">
            <option value="">ทุกระดับ</option>
            <option>ด่วนมาก</option>
            <option>ไม่เร่งด่วนแต่สำคัญ</option>
            <option>ไม่่สำคัญแต่เร่งด่วน</option>
            <option>รอได้ไม่สำคัญ</option>
          </select>
          <select id="filterStatus" onchange="applyFilter()">
            <option value="">ทุกสถานะ</option>
            <option>ยังไม่เริ่ม</option>
            <option>กำลังวางแผน</option>
            <option>ลงมือทำ</option>
            <option>ติดตามผล</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="showDone" onchange="applyFilter()"> แสดงที่เสร็จแล้วด้วย
          </label>
        </div>
      </div>
      <div id="taskContainer">
        <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- UPDATE STATUS MODAL -->
  <div id="updateModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <span class="modal-title">อัปเดตสถานะงาน</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="updateTaskName" style="font-weight:600;margin-bottom:16px;color:#0F172A"></div>
        <div class="form-group">
          <label>สถานะ</label>
          <select id="uStatus">
            <option>ยังไม่เริ่ม</option>
            <option>กำลังวางแผน</option>
            <option>ลงมือทำ</option>
            <option>ติดตามผล</option>
            <option>เสร็จเรียบร้อย</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveStatus()">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    let user, allTasks = [], editRowIndex = null;

    async function init() {
      user = requireAuth('admin');
      if (!user) return;
      setNavUser(user);
      await loadAll();
    }

    async function loadAll() {
      showLoading('taskContainer');
      try {
        const [tr, sr] = await Promise.all([
          apiGet({ action: 'getTasks', role: 'admin' }),
          apiGet({ action: 'getSummary' })
        ]);
        if (tr.success) {
          allTasks = tr.tasks;
          buildPersonFilter();
          buildTypeFilter();
          applyFilter();
        }
        if (sr.success) updateStats(sr);
      } catch (e) { showError('taskContainer', e.message); }
    }

    function updateStats(s) {
      document.getElementById('sTotal').textContent = s.total;
      document.getElementById('sPending').textContent = s.pending;
      document.getElementById('sDone').textContent = s.done;
      document.getElementById('sNear').textContent = s.nearDeadline;

      const near = allTasks.filter(t => t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย');
      document.getElementById('nearAlert').innerHTML = near.length
        ? `<div class="alert alert-danger" style="margin-bottom:16px">🔔 งานใกล้ Deadline (≤3 วัน): ${near.map(t => `<strong>${escHtml(t.task)}</strong>`).join(', ')}</div>`
        : '';
    }

    function buildPersonFilter() {
      const persons = [...new Set(allTasks.flatMap(t => t.assignTo.split(',').map(s => s.trim()).filter(Boolean)))].sort();
      const sel = document.getElementById('filterPerson');
      const cur = sel.value;
      sel.innerHTML = '<option value="">ทุกคน</option>' + persons.map(p => `<option>${p}</option>`).join('');
      sel.value = cur;
    }

    function buildTypeFilter() {
      const types = [...new Set(allTasks.map(t => t.type).filter(Boolean))].sort();
      const sel = document.getElementById('filterType');
      const cur = sel.value;
      sel.innerHTML = '<option value="">ทุกประเภท</option>' + types.map(t => `<option>${t}</option>`).join('');
      sel.value = cur;
    }

    function applyFilter() {
      const person = document.getElementById('filterPerson').value;
      const type = document.getElementById('filterType').value;
      const priority = document.getElementById('filterPriority').value;
      const status = document.getElementById('filterStatus').value;
      const showDone = document.getElementById('showDone').checked;

      const filtered = allTasks.filter(t => {
        if (!showDone && t.status === 'เสร็จเรียบร้อย') return false;
        if (person && !t.assignTo.split(',').map(s=>s.trim()).includes(person)) return false;
        if (type && t.type !== type) return false;
        if (priority && t.priority !== priority) return false;
        if (status && t.status !== status) return false;
        return true;
      });
      renderTasks(filtered);
    }

    function renderTasks(tasks) {
      if (!tasks.length) {
        document.getElementById('taskContainer').innerHTML =
          '<div class="empty-state"><span class="icon">✅</span><p>ไม่มีงานที่ตรงเงื่อนไข</p></div>';
        return;
      }

      const rows = tasks.map(t => `
        <tr class="${t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย' ? 'near-deadline-row' : ''}">
          <td style="color:#94A3B8;font-size:13px;text-align:center">${t.seq}</td>
          <td>
            <div class="task-name">${escHtml(t.task)}</div>
            <div class="text-muted" style="font-size:12px">${t.dateAdded || ''}</div>
          </td>
          <td><span style="font-size:13px">${escHtml(t.type||'-')}</span></td>
          <td>${badgePriority(t.priority)}</td>
          <td>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${t.assignTo.split(',').map(p=>p.trim()).filter(Boolean)
                .map(p=>`<span class="badge badge-planning" style="font-size:11px">${escHtml(p)}</span>`).join('')}
            </div>
          </td>
          <td>
            <div style="font-size:13px;font-weight:500">${t.deadline||'-'}</div>
            ${daysLeftHtml(t.daysLeft)}
          </td>
          <td>${t.timeSlot||'-'}</td>
          <td>${badgeStatus(t.status)}</td>
          <td style="min-width:100px">${progressBar(t.percent)}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openUpdate(${t.rowIndex})">อัปเดต</button>
          </td>
        </tr>`).join('');

      document.getElementById('taskContainer').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>ภารกิจ / งาน</th><th>ประเภท</th><th>ความสำคัญ</th>
              <th>Assign to</th><th>Deadline</th><th>ช่วงเวลา</th><th>สถานะ</th><th>ความคืบหน้า</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function openUpdate(rowIndex) {
      const t = allTasks.find(x => x.rowIndex === rowIndex);
      if (!t) return;
      editRowIndex = rowIndex;
      document.getElementById('updateTaskName').textContent = t.task;
      document.getElementById('uStatus').value = t.status || 'ยังไม่เริ่ม';
      document.getElementById('updateModal').style.display = 'flex';
    }

    async function saveStatus() {
      const status = document.getElementById('uStatus').value;
      const percent = PERCENT_MAP[status] || '0%';
      const doneDate = status === 'เสร็จเรียบร้อย' ? todayStr() : '';
      try {
        await apiPost({ action: 'updateTask', rowIndex: editRowIndex, status, percent, doneDate });
        closeModal();
        await loadAll();
      } catch (e) { alert('อัปเดตไม่สำเร็จ: ' + e.message); }
    }

    function closeModal() { document.getElementById('updateModal').style.display = 'none'; }
    function todayStr() {
      const d = new Date();
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    init();
  </script>
</body>
</html>
