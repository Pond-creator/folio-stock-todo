<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - งานวันนี้</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== STAT CARDS ===== */
    .stat-card {
      cursor: pointer;
      transition: all .18s ease;
      position: relative;
      user-select: none;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }
    .stat-card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 2.5px solid transparent;
      transition: border-color .18s;
      pointer-events: none;
    }
    /* Active state per color */
    .stat-card.active-filter { transform: translateY(-2px); }
    .stat-card.blue.active-filter  { background: #1E40AF !important; box-shadow: 0 6px 20px rgba(30,64,175,.35) !important; }
    .stat-card.blue.active-filter  .stat-label,
    .stat-card.blue.active-filter  .stat-value,
    .stat-card.blue.active-filter  .stat-sub { color: white !important; }
    .stat-card.amber.active-filter { background: #D97706 !important; box-shadow: 0 6px 20px rgba(217,119,6,.35) !important; }
    .stat-card.amber.active-filter .stat-label,
    .stat-card.amber.active-filter .stat-value,
    .stat-card.amber.active-filter .stat-sub { color: white !important; }
    .stat-card.green.active-filter { background: #16A34A !important; box-shadow: 0 6px 20px rgba(22,163,74,.35) !important; }
    .stat-card.green.active-filter .stat-label,
    .stat-card.green.active-filter .stat-value,
    .stat-card.green.active-filter .stat-sub { color: white !important; }
    .stat-card.red.active-filter   { background: #DC2626 !important; box-shadow: 0 6px 20px rgba(220,38,38,.35) !important; }
    .stat-card.red.active-filter   .stat-label,
    .stat-card.red.active-filter   .stat-value,
    .stat-card.red.active-filter   .stat-sub { color: white !important; }
    /* grey card (notstarted) */
    .stat-card.grey { border-left: 4px solid #94A3B8; }
    .stat-card.grey.active-filter  { background: #475569 !important; box-shadow: 0 6px 20px rgba(71,85,105,.35) !important; }
    .stat-card.grey.active-filter  .stat-label,
    .stat-card.grey.active-filter  .stat-value,
    .stat-card.grey.active-filter  .stat-sub { color: white !important; }

    /* filter-active indicator in card */
    .card-check {
      display: none;
      position: absolute; top: 8px; right: 10px;
      font-size: 14px; color: rgba(255,255,255,.85);
    }
    .stat-card.active-filter .card-check { display: block; }

    /* ===== DATE FILTER ===== */
    .date-filter-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .date-filter-label { font-size: 13px; font-weight: 600; color: #374151; margin-right: 4px; }
    .date-btn {
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid #E2E8F0;
      background: white; font-family: Sarabun,sans-serif; font-size: 13px;
      font-weight: 600; cursor: pointer; color: #64748B; transition: all .15s;
    }
    .date-btn:hover { border-color: #93C5FD; color: #1E40AF; background: #EFF6FF; }
    .date-btn.active { background: #2563EB; color: white; border-color: #2563EB; }
    .custom-range { display: flex; align-items: center; gap: 6px; }
    .custom-range input[type=date] {
      padding: 5px 10px; border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-family: Sarabun,sans-serif; font-size: 13px; color: #374151;
    }

    /* Admin order select */
    .order-select {
      width: 60px; padding: 4px 2px; border: 1.5px solid #E2E8F0;
      border-radius: 6px; font-size: 13px; text-align: center;
      font-family: Sarabun,sans-serif; cursor: pointer;
      background: white; color: #374151;
    }
    .order-select.has-value { border-color: #2563EB; background: #EFF6FF; color: #1E40AF; font-weight: 700; }
    .order-select:focus { outline: none; border-color: #2563EB; }

    /* active filter pill */
    .filter-active-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      color: #1E40AF; border-radius: 99px;
      padding: 3px 10px; font-size: 12px; font-weight: 600;
    }
    .filter-active-pill button {
      background: none; border: none; cursor: pointer;
      color: #60A5FA; font-size: 14px; padding: 0; line-height: 1;
    }
    .filter-active-pill button:hover { color: #1E40AF; }

  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <button id="emergencyRefreshBtn" onclick="emergencyRefresh()" style="
      background:#DC2626; color:white; border:none; border-radius:10px;
      padding:8px 20px; font-family:Sarabun,sans-serif; font-size:14px;
      font-weight:700; cursor:pointer; letter-spacing:0.3px;
      box-shadow:0 3px 10px rgba(220,38,38,.45);
      transition:all .15s; display:flex; align-items:center; gap:8px;
    " onmouseover="this.style.background='#B91C1C';this.style.transform='scale(1.04)'"
       onmouseout="this.style.background='#DC2626';this.style.transform='scale(1)'">
      🔄 <span>กดทุกครั้งก่อนเริ่มทำงาน</span>
    </button>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">

    <!-- 5 STAT CARDS -->
    <div class="stats-grid mb-16" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card blue active-filter" id="card-all" onclick="filterByCard('all')" title="ดูทั้งหมด">
        <span class="card-check">✓</span>
        <div class="stat-label">งานทั้งหมด</div>
        <div class="stat-value" id="sTotal">-</div>
        <div class="stat-sub" id="sub-all">ดูทั้งหมด</div>
      </div>
      <div class="stat-card grey" id="card-notstarted" onclick="filterByCard('notstarted')" title="กรองงานยังไม่เริ่ม">
        <span class="card-check">✓</span>
        <div class="stat-label">ยังไม่เริ่ม</div>
        <div class="stat-value" id="sNotStarted" style="color:#64748B">-</div>
        <div class="stat-sub" id="sub-notstarted">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card amber" id="card-inprogress" onclick="filterByCard('inprogress')" title="กรองงานกำลังดำเนินการ">
        <span class="card-check">✓</span>
        <div class="stat-label">กำลังดำเนินการ</div>
        <div class="stat-value" id="sPending">-</div>
        <div class="stat-sub" id="sub-inprogress">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card green" id="card-done" onclick="filterByCard('done')" title="กรองงานเสร็จแล้ว">
        <span class="card-check">✓</span>
        <div class="stat-label">เสร็จแล้ว</div>
        <div class="stat-value" id="sDone">-</div>
        <div class="stat-sub" id="sub-done">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card red" id="card-near" onclick="filterByCard('near')" title="กรองงานใกล้ Deadline">
        <span class="card-check">✓</span>
        <div class="stat-label">ใกล้ Deadline</div>
        <div class="stat-value" id="sNear">-</div>
        <div class="stat-sub" id="sub-near">คลิกเพื่อกรอง</div>
      </div>
    </div>

    <!-- NEAR DEADLINE ALERT -->
    <div id="nearAlert"></div>

    <!-- MAIN CARD -->
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="card-title" id="listTitle">📋 งานวันนี้และยังไม่เสร็จ</span>
          <span id="activeFilterPill" style="display:none"></span>
        </div>
        <div class="flex-gap">
          <button class="btn btn-primary btn-sm" onclick="location.href='admin-assign.html'">＋ มอบหมายงาน</button>
        </div>
      </div>

      <!-- DATE FILTER -->
      <div style="padding:12px 20px;border-bottom:1px solid #F1F5F9">
        <div class="date-filter-bar">
          <span class="date-filter-label">📅 ช่วงเวลา:</span>
          <button class="date-btn active" id="dbAll"        onclick="setDateFilter('all')">ทุกวัน</button>
          <button class="date-btn"        id="dbToday"      onclick="setDateFilter('today')">วันนี้</button>
          <button class="date-btn"        id="dbYesterday"  onclick="setDateFilter('yesterday')">เมื่อวาน</button>
          <button class="date-btn"        id="dbWeek"       onclick="setDateFilter('week')">7 วัน</button>
          <button class="date-btn"        id="dbMonth"      onclick="setDateFilter('month')">เดือนนี้</button>
          <button class="date-btn"        id="dbCustom"     onclick="setDateFilter('custom')">เลือกช่วง</button>
          <div class="custom-range" id="customRange" style="display:none">
            <input type="date" id="dateFrom">
            <span style="color:#64748B;font-size:13px">ถึง</span>
            <input type="date" id="dateTo">
            <button class="btn btn-primary btn-sm" onclick="applyFilter()">ดู</button>
          </div>
        </div>
        <!-- Other filters -->
        <div class="filter-bar" style="margin-top:10px;margin-bottom:0">
          <select id="filterPerson" onchange="applyFilter()">
            <option value="">ทุกคน</option>
          </select>
          <select id="filterType" onchange="applyFilter()">
            <option value="">ทุกประเภท</option>
          </select>
          <select id="filterPriority" onchange="applyFilter()">
            <option value="">ทุกระดับ</option>
            <option>ด่วนมาก</option>
            <option>ไม่เร่งด่วนแต่สำคัญ</option>
            <option>ไม่สำคัญแต่เร่งด่วน</option>
            <option>รอได้ไม่สำคัญ</option>
          </select>
        </div>
      </div>

      <div id="taskContainer">
        <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- UPDATE STATUS MODAL -->
  <div id="updateModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <span class="modal-title">อัปเดตสถานะงาน</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="updateTaskName" style="font-weight:600;margin-bottom:16px;color:#0F172A;font-size:15px"></div>
        <div class="form-group">
          <label>สถานะ</label>
          <select id="uStatus">
            <option>ยังไม่เริ่ม</option>
            <option>กำลังวางแผน</option>
            <option>ลงมือทำ</option>
            <option>ติดตามผล</option>
            <option>เสร็จเรียบร้อย</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveStatus()">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    let user, allTasks = [], activeCard = 'all', activeDateFilter = 'all', editRowIndex = null;

    const PRIO = { 'ด่วนมาก':1,'ไม่เร่งด่วนแต่สำคัญ':2,'ไม่สำคัญแต่เร่งด่วน':3,'รอได้ไม่สำคัญ':4 };
    const IN_PROGRESS = ['กำลังวางแผน','ลงมือทำ','ติดตามผล'];
    const CARD_LABEL = { all:'ทั้งหมด', notstarted:'ยังไม่เริ่ม', inprogress:'กำลังดำเนินการ', done:'เสร็จแล้ว', near:'ใกล้ Deadline' };
    const DATE_LABEL = { all:'ทุกวัน', today:'วันนี้', yesterday:'เมื่อวาน', week:'7 วัน', month:'เดือนนี้', custom:'ช่วงที่เลือก' };

    async function init() {
      user = requireAuth(['admin', 'staff']);
      if (!user) return;
      setNavUser(user);
      renderNav('today');
      await loadAll();
    }

    async function loadAll() {
      showLoading('taskContainer');
      try {
        const tr = await apiGet({ action: 'getTasks', role: 'admin' });
        if (tr.success) {
          allTasks = tr.tasks;
          buildFilters();
          updateStats();  // คำนวณจาก allTasks เลย ไม่ต้องเรียก getSummary แยก
          applyFilter();
        }
      } catch (e) { showError('taskContainer', e.message); }
    }

    async function resetAndLoad() {
      activeDateFilter = 'all';
      activeCard = 'all';
      setDateBtnActive('dbAll');
      highlightCard('all');
      document.getElementById('filterPerson').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterPriority').value = '';
      document.getElementById('customRange').style.display = 'none';
      await loadAll();
    }

    // คำนวณ stats ทั้งหมดจาก allTasks โดยตรง — แหล่งข้อมูลเดียว ไม่มีสลับ
    function updateStats() {
      const total      = allTasks.length;
      const notStarted = allTasks.filter(t => !t.status || t.status === 'ยังไม่เริ่ม').length;
      const inProgress = allTasks.filter(t => IN_PROGRESS.includes(t.status)).length;
      const done       = allTasks.filter(t => t.status === 'เสร็จเรียบร้อย').length;
      const near       = allTasks.filter(t => t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย');

      document.getElementById('sTotal').textContent      = total;
      document.getElementById('sNotStarted').textContent = notStarted;
      document.getElementById('sPending').textContent    = inProgress;
      document.getElementById('sDone').textContent       = done;
      document.getElementById('sNear').textContent       = near.length;

      document.getElementById('nearAlert').innerHTML = near.length
        ? `<div class="alert alert-danger" style="margin-bottom:16px">🔔 งานใกล้ Deadline: ${near.map(t=>`<strong>${escHtml(t.task)}</strong>`).join(', ')}</div>`
        : '';
    }

    function buildFilters() {
      const persons = [...new Set(allTasks.flatMap(t=>t.assignTo.split(',').map(s=>s.trim()).filter(Boolean)))].sort();
      const types   = [...new Set(allTasks.map(t=>t.type).filter(Boolean))].sort();
      const pSel = document.getElementById('filterPerson');
      const tSel = document.getElementById('filterType');
      const pCur = pSel.value, tCur = tSel.value;
      pSel.innerHTML = '<option value="">ทุกคน</option>' + persons.map(p=>`<option>${p}</option>`).join('');
      tSel.innerHTML = '<option value="">ทุกประเภท</option>' + types.map(t=>`<option>${t}</option>`).join('');
      pSel.value = pCur; tSel.value = tCur;
    }

    // ===== DATE FILTER =====
    function setDateFilter(f) {
      activeDateFilter = f;
      const idMap = { all:'dbAll', today:'dbToday', yesterday:'dbYesterday', week:'dbWeek', month:'dbMonth', custom:'dbCustom' };
      setDateBtnActive(idMap[f]);
      document.getElementById('customRange').style.display = f === 'custom' ? 'flex' : 'none';
      if (f !== 'custom') applyFilter();
    }

    function setDateBtnActive(id) {
      ['dbAll','dbToday','dbYesterday','dbWeek','dbMonth','dbCustom'].forEach(i => document.getElementById(i).classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // วันนี้ตามเวลาไทย UTC+7
    function todayThai() {
      const now = new Date();
      const thai = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
      thai.setHours(0, 0, 0, 0);
      return thai;
    }

    function getDateRange() {
      // 'all' = ไม่กรองวัน
      if (activeDateFilter === 'all') return null;

      const today = todayThai();
      const toDate = new Date(today); toDate.setHours(23, 59, 59, 999);

      if (activeDateFilter === 'today') {
        // วันนี้ = deadline ≤ วันนี้ (รวมงานค้างเก่า) และยังไม่เสร็จ
        return { from: new Date(2000, 0, 1), to: toDate };
      }
      if (activeDateFilter === 'yesterday') {
        const y = new Date(today); y.setDate(y.getDate() - 1);
        const ye = new Date(y); ye.setHours(23, 59, 59, 999);
        return { from: y, to: ye };
      }
      if (activeDateFilter === 'week') {
        // 7 วัน = deadline ภายใน 7 วันข้างหน้า (รวมวันนี้)
        const future = new Date(today); future.setDate(future.getDate() + 6); future.setHours(23,59,59,999);
        return { from: today, to: future };
      }
      if (activeDateFilter === 'month') {
        const m = new Date(today.getFullYear(), today.getMonth(), 1);
        const mEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0); mEnd.setHours(23,59,59,999);
        return { from: m, to: mEnd };
      }
      if (activeDateFilter === 'custom') {
        const fromVal = document.getElementById('dateFrom').value;
        const toVal   = document.getElementById('dateTo').value;
        if (!fromVal || !toVal) return null;
        const from = new Date(fromVal); from.setHours(0, 0, 0, 0);
        const to   = new Date(toVal);   to.setHours(23, 59, 59, 999);
        return { from, to };
      }
      return null;
    }

    function parseDateThai(str) {
      if (!str) return null;
      const p = str.split('/');
      if (p.length !== 3) return null;
      return new Date(Number(p[2]), Number(p[1])-1, Number(p[0]));
    }

    function isInRange(dateStr, range) {
      if (!range) return true;
      const d = parseDateThai(dateStr);
      if (!d) return false;
      return d >= range.from && d <= range.to;
    }

    // ===== CARD FILTER =====
    function filterByCard(type) {
      // กดซ้ำ → reset กลับ all
      if (activeCard === type && type !== 'all') {
        activeCard = 'all';
      } else {
        activeCard = type;
      }
      highlightCard(activeCard);
      applyFilter();
    }

    function highlightCard(type) {
      const cards = ['all','notstarted','inprogress','done','near'];
      cards.forEach(c => {
        const el = document.getElementById('card-'+c);
        if (!el) return;
        el.classList.toggle('active-filter', c === type);
        // Update sub text
        const sub = document.getElementById('sub-'+c);
        if (sub) sub.textContent = (c === type) ? '✓ กำลังกรอง' : (c === 'all' ? 'ดูทั้งหมด' : 'คลิกเพื่อกรอง');
      });
    }

    // ===== MAIN FILTER & RENDER =====
    function applyFilter() {
      const person   = document.getElementById('filterPerson').value;
      const type     = document.getElementById('filterType').value;
      const priority = document.getElementById('filterPriority').value;
      const range    = getDateRange(); // null = ไม่กรองวัน

      let base;

      // 1) กรองตาม Card (สถานะ)
      if (activeCard === 'all') {
        base = [...allTasks];
      } else {
        base = allTasks.filter(t => {
          if (activeCard === 'notstarted') return !t.status || t.status === 'ยังไม่เริ่ม';
          if (activeCard === 'inprogress') return IN_PROGRESS.includes(t.status);
          if (activeCard === 'done')       return t.status === 'เสร็จเรียบร้อย';
          if (activeCard === 'near')       return t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย';
          return true;
        });
      }

      // 2) กรองตามวันเริ่มงาน (startDate) range (ถ้าเลือกช่วง)
      if (range) {
        base = base.filter(t => {
          if (!t.startDate) return false; // ถ้าไม่มีวันเริ่มงาน ไม่แสดงเมื่อกรองวัน
          return isInRange(t.startDate, range);
        });
      }

      // 3) อัปเดต title
      const dateLabel = activeDateFilter !== 'all' ? ` · ${DATE_LABEL[activeDateFilter]}` : '';
      if (activeCard === 'all') {
        document.getElementById('listTitle').textContent = `📋 งานทั้งหมดในระบบ${dateLabel}`;
      } else {
        document.getElementById('listTitle').textContent = `📋 ${CARD_LABEL[activeCard]}${dateLabel}`;
      }

      // 4) กรองตาม person / type / priority
      base = base.filter(t => {
        if (person && !t.assignTo.split(',').map(s=>s.trim()).includes(person)) return false;
        if (type && t.type !== type) return false;
        if (priority && t.priority !== priority) return false;
        return true;
      });

      updateFilterPill();

      // เรียง: admin กำหนดลำดับมาก่อน → ที่เหลือเรียงตามสถานะแล้ว deadline
      const STATUS_ORDER = { 'ยังไม่เริ่ม':1, 'กำลังวางแผน':2, 'ลงมือทำ':3, 'ติดตามผล':4, 'เสร็จเรียบร้อย':5 };
      base.sort((a, b) => {
        const aHas = a.adminOrder !== null;
        const bHas = b.adminOrder !== null;
        if (aHas && bHas) return a.adminOrder - b.adminOrder; // เรียงตาม adminOrder
        if (aHas) return -1; // a ขึ้นก่อน
        if (bHas) return 1;  // b ขึ้นก่อน
        // ทั้งคู่ไม่มี adminOrder → เรียงตามสถานะแล้ว deadline
        const sa = STATUS_ORDER[a.status] || 1;
        const sb = STATUS_ORDER[b.status] || 1;
        if (sa !== sb) return sa - sb;
        const da = parseDateThai(a.deadline) || new Date(9999,0,1);
        const db = parseDateThai(b.deadline) || new Date(9999,0,1);
        return da - db;
      });

      renderFlatList(base);
    }

    function updateFilterPill() {
      const pill = document.getElementById('activeFilterPill');
      const hasCardFilter = activeCard !== 'all';
      const hasDateFilter = activeDateFilter !== 'all';
      if (!hasCardFilter && !hasDateFilter) {
        pill.style.display = 'none';
        return;
      }
      const parts = [];
      if (hasCardFilter) parts.push(CARD_LABEL[activeCard]);
      if (hasDateFilter) parts.push(DATE_LABEL[activeDateFilter]);
      pill.style.display = 'inline-flex';
      pill.innerHTML = `<span class="filter-active-pill">
        🔍 กรองตาม: ${parts.join(' · ')}
        <button onclick="clearAllFilters()" title="ล้างตัวกรอง">✕</button>
      </span>`;
    }

    function clearAllFilters() {
      activeCard = 'all';
      activeDateFilter = 'all';
      highlightCard('all');
      setDateBtnActive('dbAll');
      document.getElementById('customRange').style.display = 'none';
      applyFilter();
    }

    function renderFlatList(tasks) {
      if (!tasks.length) {
        document.getElementById('taskContainer').innerHTML =
          '<div class="empty-state"><span class="icon">📋</span><p>ไม่มีงานที่ตรงเงื่อนไข</p></div>';
        return;
      }
      document.getElementById('taskContainer').innerHTML = taskTable(tasks);
    }

    function taskTable(tasks) {
      const isAdmin = user && user.role === 'admin';
      // รวบรวมหมายเลขที่ถูกใช้แล้ว
      const usedOrders = new Set(allTasks.map(t => t.adminOrder).filter(n => n !== null));
      const maxOrder = allTasks.length;

      const rows = tasks.map(t => {
        const orderSelect = isAdmin ? buildOrderSelect(t, usedOrders, maxOrder) : '';
        return `
        <tr class="${t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย' ? 'near-deadline-row' : ''}">
          <td style="color:#94A3B8;font-size:13px;text-align:center;width:36px">${t.seq}</td>
          <td>
            <div class="task-name">${escHtml(t.task)}</div>
            <div class="text-muted" style="font-size:12px">${t.dateAdded||''}</div>
          </td>
          <td><span style="font-size:13px">${escHtml(t.type||'-')}</span></td>
          <td>${badgePriority(t.priority)}</td>
          <td>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${t.assignTo.split(',').map(p=>p.trim()).filter(Boolean)
                .map(p=>`<span class="badge badge-planning" style="font-size:11px">${escHtml(p)}</span>`).join('')}
            </div>
          </td>
          <td>
            <div style="font-size:13px;font-weight:500">${t.deadline||'-'}</div>
            ${daysLeftHtml(t.daysLeft)}
          </td>
          <td><span style="font-size:13px">${t.timeSlot||'-'}</span></td>
          <td>${badgeStatus(t.status)}</td>
          <td style="min-width:100px">${progressBar(t.percent)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-outline btn-sm" onclick="openUpdate(${t.rowIndex})">อัปเดต</button>
            ${orderSelect}
          </td>
        </tr>`;
      }).join('');

      const orderHeader = isAdmin ? '<th style="width:70px">ลำดับ</th>' : '';
      return `<div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>ภารกิจ / งาน</th><th>ประเภท</th><th>ความสำคัญ</th>
          <th>Assign to</th><th>Deadline</th><th>ช่วงเวลา</th><th>สถานะ</th>
          <th>ความคืบหน้า</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }

    function buildOrderSelect(t, usedOrders, maxOrder) {
      const cur = t.adminOrder;
      let opts = `<option value="">-</option>`;
      for (let n = 1; n <= maxOrder; n++) {
        // disable ถ้าถูกใช้โดยงานอื่น (ไม่ใช่งานนี้)
        const taken = usedOrders.has(n) && cur !== n;
        opts += `<option value="${n}" ${cur === n ? 'selected' : ''} ${taken ? 'disabled' : ''}>${n}</option>`;
      }
      const cls = cur !== null ? 'order-select has-value' : 'order-select';
      return `<select class="${cls}" onchange="setAdminOrder(${t.rowIndex}, this)">${opts}</select>`;
    }

    async function setAdminOrder(rowIndex, sel) {
      const val = sel.value === '' ? '' : Number(sel.value);
      // อัปเดต local ทันที
      const t = allTasks.find(x => x.rowIndex === rowIndex);
      if (t) t.adminOrder = val === '' ? null : val;
      sel.className = val !== '' ? 'order-select has-value' : 'order-select';
      try {
        await apiPost({ action: 'updateAdminOrder', rowIndex, adminOrder: val });
        applyFilter(); // re-render เพื่ออัปเดต dropdown ทุกแถว
      } catch(e) {
        alert('บันทึกไม่สำเร็จ: ' + e.message);
      }
    }

    function openUpdate(rowIndex) {
      const t = allTasks.find(x => x.rowIndex === rowIndex);
      if (!t) return;
      editRowIndex = rowIndex;
      document.getElementById('updateTaskName').textContent = t.task;
      document.getElementById('uStatus').value = t.status || 'ยังไม่เริ่ม';
      document.getElementById('updateModal').style.display = 'flex';
    }

    async function saveStatus() {
      const status  = document.getElementById('uStatus').value;
      const percent = PERCENT_MAP[status] || '0%';
      const doneDate = status === 'เสร็จเรียบร้อย' ? todayStr() : '';
      try {
        await apiPost({ action: 'updateTask', rowIndex: editRowIndex, status, percent, doneDate });
        closeModal();
        await loadAll();
      } catch (e) { alert('อัปเดตไม่สำเร็จ: ' + e.message); }
    }

    function closeModal() { document.getElementById('updateModal').style.display = 'none'; }

    function fmtDateThai(d) {
      const thai = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
      return `${String(thai.getDate()).padStart(2,'0')}/${String(thai.getMonth()+1).padStart(2,'0')}/${thai.getFullYear()}`;
    }
    function todayStr() { return fmtDateThai(new Date()); }
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function emergencyRefresh() {
      const btn = document.getElementById('emergencyRefreshBtn');
      btn.disabled = true;
      btn.innerHTML = '⏳ <span>กำลังโหลด...</span>';
      btn.style.background = '#991B1B';
      await resetAndLoad();
      btn.innerHTML = '✅ <span>โหลดแล้ว!</span>';
      btn.style.background = '#16A34A';
      setTimeout(() => {
        btn.innerHTML = '🔄 <span>กดทุกครั้งก่อนเริ่มทำงาน</span>';
        btn.style.background = '#DC2626';
        btn.disabled = false;
      }, 1500);
    }

    init();
  </script>
</body>
</html>
