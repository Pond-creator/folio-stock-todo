<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - งานวันนี้</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== STAT CARDS ===== */
    .stat-card {
      cursor: pointer;
      transition: all .18s ease;
      position: relative;
      user-select: none;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }
    .stat-card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 2.5px solid transparent;
      transition: border-color .18s;
      pointer-events: none;
    }
    /* Active state per color */
    .stat-card.active-filter { transform: translateY(-2px); }
    .stat-card.blue.active-filter  { background: #1E40AF !important; box-shadow: 0 6px 20px rgba(30,64,175,.35) !important; }
    .stat-card.blue.active-filter  .stat-label,
    .stat-card.blue.active-filter  .stat-value,
    .stat-card.blue.active-filter  .stat-sub { color: white !important; }
    .stat-card.amber.active-filter { background: #D97706 !important; box-shadow: 0 6px 20px rgba(217,119,6,.35) !important; }
    .stat-card.amber.active-filter .stat-label,
    .stat-card.amber.active-filter .stat-value,
    .stat-card.amber.active-filter .stat-sub { color: white !important; }
    .stat-card.green.active-filter { background: #16A34A !important; box-shadow: 0 6px 20px rgba(22,163,74,.35) !important; }
    .stat-card.green.active-filter .stat-label,
    .stat-card.green.active-filter .stat-value,
    .stat-card.green.active-filter .stat-sub { color: white !important; }
    .stat-card.red.active-filter   { background: #DC2626 !important; box-shadow: 0 6px 20px rgba(220,38,38,.35) !important; }
    .stat-card.red.active-filter   .stat-label,
    .stat-card.red.active-filter   .stat-value,
    .stat-card.red.active-filter   .stat-sub { color: white !important; }
    /* grey card (notstarted) */
    .stat-card.grey { border-left: 4px solid #94A3B8; }
    .stat-card.grey.active-filter  { background: #475569 !important; box-shadow: 0 6px 20px rgba(71,85,105,.35) !important; }
    .stat-card.grey.active-filter  .stat-label,
    .stat-card.grey.active-filter  .stat-value,
    .stat-card.grey.active-filter  .stat-sub { color: white !important; }
    /* darkred card (overdue) */
    .stat-card.darkred { border-left: 4px solid #7F1D1D; }
    .stat-card.darkred .stat-value { color: #7F1D1D; }
    .stat-card.darkred.active-filter { background: #7F1D1D !important; box-shadow: 0 6px 20px rgba(127,29,29,.35) !important; }
    .stat-card.darkred.active-filter .stat-label,
    .stat-card.darkred.active-filter .stat-value,
    .stat-card.darkred.active-filter .stat-sub { color: white !important; }

    /* filter-active indicator in card */
    .card-check {
      display: none;
      position: absolute; top: 8px; right: 10px;
      font-size: 14px; color: rgba(255,255,255,.85);
    }
    .stat-card.active-filter .card-check { display: block; }

    /* ===== DATE FILTER ===== */
    .date-filter-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .date-filter-label { font-size: 13px; font-weight: 600; color: #374151; margin-right: 4px; }
    .date-btn {
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid #E2E8F0;
      background: white; font-family: Sarabun,sans-serif; font-size: 13px;
      font-weight: 600; cursor: pointer; color: #64748B; transition: all .15s;
    }
    .date-btn:hover { border-color: #93C5FD; color: #1E40AF; background: #EFF6FF; }
    .date-btn.active { background: #2563EB; color: white; border-color: #2563EB; }
    .custom-range { display: flex; align-items: center; gap: 6px; }
    .custom-range input[type=date] {
      padding: 5px 10px; border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-family: Sarabun,sans-serif; font-size: 13px; color: #374151;
    }

    /* Done row highlight */
    .done-row { background: #F0FDF4 !important; }
    .done-row td { opacity: 0.75; }

    /* Admin order select */
    .order-select {
      width: 60px; padding: 4px 2px; border: 1.5px solid #E2E8F0;
      border-radius: 6px; font-size: 13px; text-align: center;
      font-family: Sarabun,sans-serif; cursor: pointer;
      background: white; color: #374151;
    }
    .order-select.has-value { border-color: #2563EB; background: #EFF6FF; color: #1E40AF; font-weight: 700; }
    .order-select:focus { outline: none; border-color: #2563EB; }

    /* ===== MARQUEE ALERT ===== */
    .marquee-wrap {
      overflow: hidden;
      background: #FFF1F2;
      border: 1px solid #FECDD3;
      border-radius: 10px;
      padding: 10px 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
    }
    .marquee-label {
      flex-shrink: 0;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      color: #BE123C;
      border-right: 2px solid #FECDD3;
      margin-right: 0;
      white-space: nowrap;
    }
    .marquee-track {
      display: flex;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .marquee-inner {
      display: flex;
      gap: 0;
      white-space: nowrap;
      animation: marquee-scroll 90s linear infinite;
      will-change: transform;
    }
    .marquee-inner:hover { animation-play-state: paused; }
    @keyframes marquee-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .marquee-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 28px;
      font-size: 15px;
      color: #881337;
      font-weight: 600;
    }
    .marquee-item .m-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .marquee-item .m-overdue { background: #FFE4E6; color: #BE123C; }
    .marquee-item .m-near    { background: #FEF3C7; color: #92400E; }
    .marquee-sep {
      display: inline-flex;
      align-items: center;
      color: #FECDD3;
      padding: 0 4px;
      font-size: 18px;
      line-height: 1;
    }

    /* active filter pill */
    .filter-active-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      color: #1E40AF; border-radius: 99px;
      padding: 3px 10px; font-size: 12px; font-weight: 600;
    }
    .filter-active-pill button {
      background: none; border: none; cursor: pointer;
      color: #60A5FA; font-size: 14px; padding: 0; line-height: 1;
    }
    .filter-active-pill button:hover { color: #1E40AF; }

  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <button id="emergencyRefreshBtn" onclick="emergencyRefresh()" style="
      background:#DC2626; color:white; border:none; border-radius:10px;
      padding:8px 20px; font-family:Sarabun,sans-serif; font-size:14px;
      font-weight:700; cursor:pointer; letter-spacing:0.3px;
      box-shadow:0 3px 10px rgba(220,38,38,.45);
      transition:all .15s; display:flex; align-items:center; gap:8px;
    " onmouseover="this.style.background='#B91C1C';this.style.transform='scale(1.04)'"
       onmouseout="this.style.background='#DC2626';this.style.transform='scale(1)'">
      🔄 <span>กดทุกครั้งก่อนเริ่มทำงาน</span>
    </button>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">

    <!-- 5 STAT CARDS -->
    <div class="stats-grid mb-16" style="grid-template-columns:repeat(6,1fr)">
      <div class="stat-card blue active-filter" id="card-all" onclick="filterByCard('all')" title="ดูทั้งหมด">
        <span class="card-check">✓</span>
        <div class="stat-label">งานทั้งหมด</div>
        <div class="stat-value" id="sTotal">-</div>
        <div class="stat-sub" id="sub-all">ดูทั้งหมด</div>
      </div>
      <div class="stat-card grey" id="card-notstarted" onclick="filterByCard('notstarted')" title="กรองงานยังไม่เริ่ม">
        <span class="card-check">✓</span>
        <div class="stat-label">ยังไม่เริ่ม</div>
        <div class="stat-value" id="sNotStarted" style="color:#64748B">-</div>
        <div class="stat-sub" id="sub-notstarted">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card amber" id="card-inprogress" onclick="filterByCard('inprogress')" title="กรองงานกำลังดำเนินการ">
        <span class="card-check">✓</span>
        <div class="stat-label">กำลังดำเนินการ</div>
        <div class="stat-value" id="sPending">-</div>
        <div class="stat-sub" id="sub-inprogress">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card red" id="card-near" onclick="filterByCard('near')" title="กรองงานใกล้ Deadline">
        <span class="card-check">✓</span>
        <div class="stat-label">ใกล้ Deadline</div>
        <div class="stat-value" id="sNear">-</div>
        <div class="stat-sub" id="sub-near">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card darkred" id="card-overdue" onclick="filterByCard('overdue')" title="กรองงานเกิน Deadline">
        <span class="card-check">✓</span>
        <div class="stat-label">เกิน Deadline</div>
        <div class="stat-value" id="sOverdue">-</div>
        <div class="stat-sub" id="sub-overdue">คลิกเพื่อกรอง</div>
      </div>
      <div class="stat-card green" id="card-done" onclick="filterByCard('done')" title="กรองงานเสร็จแล้ว">
        <span class="card-check">✓</span>
        <div class="stat-label">เสร็จแล้ว</div>
        <div class="stat-value" id="sDone">-</div>
        <div class="stat-sub" id="sub-done">คลิกเพื่อกรอง</div>
      </div>
    </div>

    <!-- NEAR DEADLINE ALERT -->
    <div id="nearAlert"></div>

    <!-- MAIN CARD -->
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="card-title" id="listTitle">📋 งานวันนี้และยังไม่เสร็จ</span>
          <span id="activeFilterPill" style="display:none"></span>
        </div>
        <div class="flex-gap">
          <button class="btn btn-outline btn-sm" onclick="exportTasks()">⬇️ Export CSV</button>
          <button class="btn btn-primary btn-sm" onclick="location.href='admin-assign.html'">＋ มอบหมายงาน</button>
        </div>
      </div>

      <!-- DATE FILTER -->
      <div style="padding:12px 20px;border-bottom:1px solid #F1F5F9">
        <div class="date-filter-bar">
          <span class="date-filter-label">📅 ช่วงเวลา:</span>
          <button class="date-btn active" id="dbAll"        onclick="setDateFilter('all')">ทุกวัน</button>
          <button class="date-btn"        id="dbToday"      onclick="setDateFilter('today')">วันนี้</button>
          <button class="date-btn"        id="dbYesterday"  onclick="setDateFilter('yesterday')">เมื่อวาน</button>
          <button class="date-btn"        id="dbWeek"       onclick="setDateFilter('week')">7 วัน</button>
          <button class="date-btn"        id="dbMonth"      onclick="setDateFilter('month')">เดือนนี้</button>
          <button class="date-btn"        id="dbCustom"     onclick="setDateFilter('custom')">เลือกช่วง</button>
          <div class="custom-range" id="customRange" style="display:none">
            <input type="date" id="dateFrom">
            <span style="color:#64748B;font-size:13px">ถึง</span>
            <input type="date" id="dateTo">
            <button class="btn btn-primary btn-sm" onclick="applyFilter()">ดู</button>
          </div>
        </div>
        <!-- Other filters -->
        <div class="filter-bar" style="margin-top:10px;margin-bottom:0">
          <select id="filterPerson" onchange="applyFilter()">
            <option value="">ทุกคน</option>
          </select>
          <select id="filterType" onchange="applyFilter()">
            <option value="">ทุกประเภท</option>
          </select>
          <select id="filterPriority" onchange="applyFilter()">
            <option value="">ทุกระดับ</option>
            <option>ด่วนมาก</option>
            <option>ไม่เร่งด่วนแต่สำคัญ</option>
            <option>ไม่สำคัญแต่เร่งด่วน</option>
            <option>รอได้ไม่สำคัญ</option>
          </select>
        </div>
      </div>

      <div id="taskContainer">
        <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- EDIT TASK MODAL -->
  <div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
    <div class="modal" style="max-width:540px">
      <div class="modal-header">
        <span class="modal-title">✏️ แก้ไขงาน</span>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="modal-body" style="max-height:65vh;overflow-y:auto">
        <div class="form-group">
          <label>ภารกิจ / งาน</label>
          <textarea id="eTask" rows="2" style="width:100%;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-family:Sarabun,sans-serif;font-size:14px;resize:vertical;box-sizing:border-box"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>ประเภทงาน</label>
            <select id="eType"></select>
          </div>
          <div class="form-group">
            <label>ความสำคัญ</label>
            <select id="ePriority">
              <option value="">-- ไม่ระบุ --</option>
              <option>ด่วนมาก</option>
              <option>ไม่เร่งด่วนแต่สำคัญ</option>
              <option>ไม่สำคัญแต่เร่งด่วน</option>
              <option>รอได้ไม่สำคัญ</option>
            </select>
          </div>
          <div class="form-group">
            <label>วันเริ่มงาน</label>
            <input type="date" id="eStartDate" style="width:100%;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-family:Sarabun,sans-serif;font-size:14px;box-sizing:border-box">
          </div>
          <div class="form-group">
            <label>Deadline</label>
            <input type="date" id="eDeadline" style="width:100%;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-family:Sarabun,sans-serif;font-size:14px;box-sizing:border-box">
          </div>
          <div class="form-group">
            <label>ช่วงเวลา</label>
            <select id="eTimeSlot"></select>
          </div>
          <div class="form-group">
            <label>สถานะ</label>
            <select id="eStatus">
              <option>ยังไม่เริ่ม</option>
              <option>กำลังวางแผน</option>
              <option>ลงมือทำ</option>
              <option>ติดตามผล</option>
              <option>เสร็จเรียบร้อย</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Assign To</label>
          <div id="eAssignWrap" style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEditModal()">ยกเลิก</button>
        <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">💾 บันทึก</button>
      </div>
    </div>
  </div>

  <!-- AUDIT LOG MODAL -->
  <div id="auditModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAuditModal()">
    <div class="modal" style="max-width:720px">
      <div class="modal-header">
        <span class="modal-title">📋 ประวัติการแก้ไข</span>
        <button class="modal-close" onclick="closeAuditModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="auditTaskName" style="font-weight:600;color:#0F172A;margin-bottom:12px;font-size:14px"></div>
        <div id="auditContent"><div class="loading"><div class="spinner"></div> กำลังโหลด...</div></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js?v=2"></script>
  <script>
    let user, allTasks = [], filteredTasks = [], activeCard = 'all', activeDateFilter = 'all', editRowIndex = null;
    const PAGE_SIZE = 30;
    let currentPage = 1;

    const PRIO = { 'ด่วนมาก':1,'ไม่เร่งด่วนแต่สำคัญ':2,'ไม่สำคัญแต่เร่งด่วน':3,'รอได้ไม่สำคัญ':4 };
    const IN_PROGRESS = ['กำลังวางแผน','ลงมือทำ','ติดตามผล'];
    const CARD_LABEL = { all:'ทั้งหมด', notstarted:'ยังไม่เริ่ม', inprogress:'กำลังดำเนินการ', done:'เสร็จแล้ว', near:'ใกล้ Deadline', overdue:'เกิน Deadline' };
    const DATE_LABEL = { all:'ทุกวัน', today:'วันนี้', yesterday:'เมื่อวาน', week:'7 วัน', month:'เดือนนี้', custom:'ช่วงที่เลือก' };

    async function init() {
      user = requireAuth(['admin', 'staff']);
      if (!user) return;
      setNavUser(user);
      renderNav('today');
      await loadAll();
    }

    async function loadAll() {
      showLoading('taskContainer');
      try {
        const tr = await apiGet({ action: 'getTasks', role: 'admin' });
        if (tr.success) {
          allTasks = tr.tasks;
          buildFilters();
          updateStats();
          updateResetOrderBtn();
          applyFilter();
        }
      } catch (e) { showError('taskContainer', e.message); }
    }

    async function resetAndLoad() {
      activeDateFilter = 'all';
      activeCard = 'all';
      setDateBtnActive('dbAll');
      highlightCard('all');
      document.getElementById('filterPerson').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterPriority').value = '';
      document.getElementById('customRange').style.display = 'none';
      await loadAll();
    }

    // คำนวณ stats ทั้งหมดจาก allTasks โดยตรง — แหล่งข้อมูลเดียว ไม่มีสลับ
    function updateStats() {
      const total      = allTasks.length;
      const notStarted = allTasks.filter(t => !t.status || t.status === 'ยังไม่เริ่ม').length;
      const inProgress = allTasks.filter(t => IN_PROGRESS.includes(t.status)).length;
      const done       = allTasks.filter(t => t.status === 'เสร็จเรียบร้อย').length;
      const near       = allTasks.filter(t => t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย');

      const overdue = allTasks.filter(t => t.daysLeft !== null && t.daysLeft < 0 && t.status !== 'เสร็จเรียบร้อย');

      document.getElementById('sTotal').textContent      = total;
      document.getElementById('sNotStarted').textContent = notStarted;
      document.getElementById('sPending').textContent    = inProgress;
      document.getElementById('sDone').textContent       = done;
      document.getElementById('sNear').textContent       = near.length;
      document.getElementById('sOverdue').textContent    = overdue.length;

      const alertItems = [
        ...overdue.map(t => `<span class="marquee-item"><span class="m-badge m-overdue">🔴 เกิน ${Math.abs(t.daysLeft)} วัน</span>${escHtml(t.task)}</span><span class="marquee-sep">·</span>`),
        ...near.map(t   => `<span class="marquee-item"><span class="m-badge m-near">⚠️ ใกล้ Deadline</span>${escHtml(t.task)}</span><span class="marquee-sep">·</span>`)
      ];
      if (alertItems.length) {
        const inner = alertItems.join('');
        document.getElementById('nearAlert').innerHTML = `
          <div class="marquee-wrap">
            <div class="marquee-label">🔔 แจ้งเตือน</div>
            <div class="marquee-track">
              <div class="marquee-inner">${inner}${inner}</div>
            </div>
          </div>`;
      } else {
        document.getElementById('nearAlert').innerHTML = '';
      }
    }

    function buildFilters() {
      const persons = [...new Set(allTasks.flatMap(t=>t.assignTo.split(',').map(s=>s.trim()).filter(Boolean)))].sort();
      const types   = [...new Set(allTasks.map(t=>t.type).filter(Boolean))].sort();
      const pSel = document.getElementById('filterPerson');
      const tSel = document.getElementById('filterType');
      const pCur = pSel.value, tCur = tSel.value;
      pSel.innerHTML = '<option value="">ทุกคน</option>' + persons.map(p=>`<option>${p}</option>`).join('');
      tSel.innerHTML = '<option value="">ทุกประเภท</option>' + types.map(t=>`<option>${t}</option>`).join('');
      pSel.value = pCur; tSel.value = tCur;
    }

    // ===== DATE FILTER =====
    function setDateFilter(f) {
      activeDateFilter = f;
      const idMap = { all:'dbAll', today:'dbToday', yesterday:'dbYesterday', week:'dbWeek', month:'dbMonth', custom:'dbCustom' };
      setDateBtnActive(idMap[f]);
      document.getElementById('customRange').style.display = f === 'custom' ? 'flex' : 'none';
      if (f !== 'custom') applyFilter();
    }

    function setDateBtnActive(id) {
      ['dbAll','dbToday','dbYesterday','dbWeek','dbMonth','dbCustom'].forEach(i => document.getElementById(i).classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // วันนี้ตามเวลาไทย UTC+7
    function todayThai() {
      const now = new Date();
      const thai = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
      thai.setHours(0, 0, 0, 0);
      return thai;
    }

    function getDateRange() {
      // 'all' = ไม่กรองวัน
      if (activeDateFilter === 'all') return null;

      const today = todayThai();
      const toDate = new Date(today); toDate.setHours(23, 59, 59, 999);

      if (activeDateFilter === 'today') {
        // วันนี้ = deadline ≤ วันนี้ (รวมงานค้างเก่า) และยังไม่เสร็จ
        return { from: new Date(2000, 0, 1), to: toDate };
      }
      if (activeDateFilter === 'yesterday') {
        const y = new Date(today); y.setDate(y.getDate() - 1);
        const ye = new Date(y); ye.setHours(23, 59, 59, 999);
        return { from: y, to: ye };
      }
      if (activeDateFilter === 'week') {
        // 7 วัน = deadline ภายใน 7 วันข้างหน้า (รวมวันนี้)
        const future = new Date(today); future.setDate(future.getDate() + 6); future.setHours(23,59,59,999);
        return { from: today, to: future };
      }
      if (activeDateFilter === 'month') {
        const m = new Date(today.getFullYear(), today.getMonth(), 1);
        const mEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0); mEnd.setHours(23,59,59,999);
        return { from: m, to: mEnd };
      }
      if (activeDateFilter === 'custom') {
        const fromVal = document.getElementById('dateFrom').value;
        const toVal   = document.getElementById('dateTo').value;
        if (!fromVal || !toVal) return null;
        const from = new Date(fromVal); from.setHours(0, 0, 0, 0);
        const to   = new Date(toVal);   to.setHours(23, 59, 59, 999);
        return { from, to };
      }
      return null;
    }

    function parseDateThai(str) {
      if (!str) return null;
      const p = str.split('/');
      if (p.length !== 3) return null;
      return new Date(Number(p[2]), Number(p[1])-1, Number(p[0]));
    }

    function isInRange(dateStr, range) {
      if (!range) return true;
      const d = parseDateThai(dateStr);
      if (!d) return false;
      return d >= range.from && d <= range.to;
    }

    // ===== CARD FILTER =====
    function filterByCard(type) {
      // กดซ้ำ → reset กลับ all
      if (activeCard === type && type !== 'all') {
        activeCard = 'all';
      } else {
        activeCard = type;
      }
      highlightCard(activeCard);
      applyFilter();
    }

    function highlightCard(type) {
      const cards = ['all','notstarted','inprogress','done','near','overdue'];
      cards.forEach(c => {
        const el = document.getElementById('card-'+c);
        if (!el) return;
        el.classList.toggle('active-filter', c === type);
        // Update sub text
        const sub = document.getElementById('sub-'+c);
        if (sub) sub.textContent = (c === type) ? '✓ กำลังกรอง' : (c === 'all' ? 'ดูทั้งหมด' : 'คลิกเพื่อกรอง');
      });
    }

    // ===== MAIN FILTER & RENDER =====
    function applyFilter() {
      const person   = document.getElementById('filterPerson').value;
      const type     = document.getElementById('filterType').value;
      const priority = document.getElementById('filterPriority').value;
      const range    = getDateRange(); // null = ไม่กรองวัน

      let base;

      // 1) กรองตาม Card (สถานะ)
      if (activeCard === 'all') {
        base = [...allTasks];
      } else {
        base = allTasks.filter(t => {
          if (activeCard === 'notstarted') return !t.status || t.status === 'ยังไม่เริ่ม';
          if (activeCard === 'inprogress') return IN_PROGRESS.includes(t.status);
          if (activeCard === 'done')       return t.status === 'เสร็จเรียบร้อย';
          if (activeCard === 'near')       return t.isNearDeadline && t.status !== 'เสร็จเรียบร้อย';
          if (activeCard === 'overdue')    return t.daysLeft !== null && t.daysLeft < 0 && t.status !== 'เสร็จเรียบร้อย';
          return true;
        });
      }

      // 2) กรองตามวันเริ่มงาน (startDate) range (ถ้าเลือกช่วง)
      if (range) {
        base = base.filter(t => {
          if (!t.startDate) return false; // ถ้าไม่มีวันเริ่มงาน ไม่แสดงเมื่อกรองวัน
          return isInRange(t.startDate, range);
        });
      }

      // 3) อัปเดต title
      const dateLabel = activeDateFilter !== 'all' ? ` · ${DATE_LABEL[activeDateFilter]}` : '';
      if (activeCard === 'all') {
        document.getElementById('listTitle').textContent = `📋 งานทั้งหมดในระบบ${dateLabel}`;
      } else {
        document.getElementById('listTitle').textContent = `📋 ${CARD_LABEL[activeCard]}${dateLabel}`;
      }

      // 4) กรองตาม person / type / priority
      base = base.filter(t => {
        if (person && !t.assignTo.split(',').map(s=>s.trim()).includes(person)) return false;
        if (type && t.type !== type) return false;
        if (priority && t.priority !== priority) return false;
        return true;
      });

      updateFilterPill();

      // เรียง: admin กำหนดลำดับมาก่อน → ที่เหลือเรียงตามสถานะแล้ว deadline
      const STATUS_ORDER = { 'ยังไม่เริ่ม':1, 'กำลังวางแผน':2, 'ลงมือทำ':3, 'ติดตามผล':4, 'เสร็จเรียบร้อย':5 };
      base.sort((a, b) => {
        const aHas = a.adminOrder !== null;
        const bHas = b.adminOrder !== null;
        if (aHas && bHas) return a.adminOrder - b.adminOrder; // เรียงตาม adminOrder
        if (aHas) return -1; // a ขึ้นก่อน
        if (bHas) return 1;  // b ขึ้นก่อน
        // ทั้งคู่ไม่มี adminOrder → เรียงตามสถานะแล้ว deadline
        const sa = STATUS_ORDER[a.status] || 1;
        const sb = STATUS_ORDER[b.status] || 1;
        if (sa !== sb) return sa - sb;
        const da = parseDateThai(a.deadline) || new Date(9999,0,1);
        const db = parseDateThai(b.deadline) || new Date(9999,0,1);
        return da - db;
      });

      filteredTasks = base;
      currentPage = 1;
      renderFlatList(base);
    }

    function exportCSV(rows, filename) {
      const BOM = '﻿';
      const csv = BOM + rows.map(r =>
        r.map(v => {
          const s = String(v == null ? '' : v);
          return (s.includes(',') || s.includes('"') || s.includes('\n'))
            ? '"' + s.replace(/"/g, '""') + '"' : s;
        }).join(',')
      ).join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function todayFilename(prefix) {
      const d = new Date();
      const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return `${prefix}_${s}.csv`;
    }

    function exportTasks() {
      if (!filteredTasks.length) { alert('ไม่มีข้อมูลที่จะ Export'); return; }
      const header = ['#','ภารกิจ/งาน','ประเภท','ความสำคัญ','Assign To','วันเริ่มงาน','Deadline','เหลือ (วัน)','ช่วงเวลา','สถานะ','ความคืบหน้า'];
      const rows = filteredTasks.map(t => [
        t.seq, t.task, t.type||'', t.priority||'',
        t.assignTo, t.startDate||'', t.deadline||'',
        t.daysLeft !== null && t.daysLeft !== undefined ? t.daysLeft : '',
        t.timeSlot||'', t.status||'', t.percent||'0%'
      ]);
      exportCSV([header, ...rows], todayFilename('งานวันนี้'));
    }

    function updateFilterPill() {
      const pill = document.getElementById('activeFilterPill');
      const hasCardFilter = activeCard !== 'all';
      const hasDateFilter = activeDateFilter !== 'all';
      if (!hasCardFilter && !hasDateFilter) {
        pill.style.display = 'none';
        return;
      }
      const parts = [];
      if (hasCardFilter) parts.push(CARD_LABEL[activeCard]);
      if (hasDateFilter) parts.push(DATE_LABEL[activeDateFilter]);
      pill.style.display = 'inline-flex';
      pill.innerHTML = `<span class="filter-active-pill">
        🔍 กรองตาม: ${parts.join(' · ')}
        <button onclick="clearAllFilters()" title="ล้างตัวกรอง">✕</button>
      </span>`;
    }

    function clearAllFilters() {
      activeCard = 'all';
      activeDateFilter = 'all';
      highlightCard('all');
      setDateBtnActive('dbAll');
      document.getElementById('customRange').style.display = 'none';
      applyFilter();
    }

    function renderFlatList(tasks) {
      if (!tasks.length) {
        document.getElementById('taskContainer').innerHTML =
          '<div class="empty-state"><span class="icon">📋</span><p>ไม่มีงานที่ตรงเงื่อนไข</p></div>';
        return;
      }
      const totalPages = Math.ceil(tasks.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = tasks.slice(start, start + PAGE_SIZE);
      document.getElementById('taskContainer').innerHTML =
        taskTable(pageItems) + renderPagination(tasks.length, totalPages);
    }

    function renderPagination(total, totalPages) {
      if (totalPages <= 1) return '';
      const from = (currentPage - 1) * PAGE_SIZE + 1;
      const to = Math.min(currentPage * PAGE_SIZE, total);

      let pages = '';
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          pages += `<button onclick="goPage(${i})" style="
            padding:6px 12px; border-radius:8px; border:1.5px solid ${i===currentPage?'#2563EB':'#E2E8F0'};
            background:${i===currentPage?'#2563EB':'white'}; color:${i===currentPage?'white':'#374151'};
            font-family:Sarabun,sans-serif; font-size:13px; font-weight:600; cursor:pointer; min-width:36px;
          ">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          pages += `<span style="color:#94A3B8;padding:0 4px">…</span>`;
        }
      }

      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid #F1F5F9;flex-wrap:wrap;gap:8px">
        <span style="font-size:13px;color:#64748B">แสดง ${from}–${to} จากทั้งหมด ${total} งาน</span>
        <div style="display:flex;align-items:center;gap:6px">
          <button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''} style="
            padding:6px 12px; border-radius:8px; border:1.5px solid #E2E8F0;
            background:white; color:${currentPage===1?'#CBD5E1':'#374151'};
            font-family:Sarabun,sans-serif; font-size:13px; cursor:${currentPage===1?'default':'pointer'};
          ">‹ ก่อนหน้า</button>
          ${pages}
          <button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''} style="
            padding:6px 12px; border-radius:8px; border:1.5px solid #E2E8F0;
            background:white; color:${currentPage===totalPages?'#CBD5E1':'#374151'};
            font-family:Sarabun,sans-serif; font-size:13px; cursor:${currentPage===totalPages?'default':'pointer'};
          ">ถัดไป ›</button>
        </div>
      </div>`;
    }

    function goPage(p) {
      const totalPages = Math.ceil(filteredTasks.length / PAGE_SIZE);
      if (p < 1 || p > totalPages) return;
      currentPage = p;
      renderFlatList(filteredTasks);
      document.getElementById('taskContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function taskTable(tasks) {
      const isAdmin = user && user.role === 'admin';
      // รวบรวมหมายเลขที่ถูกใช้แล้ว
      const usedOrders = new Set(allTasks.map(t => t.adminOrder).filter(n => n !== null));
      const maxOrder = allTasks.length;

      const rows = tasks.map(t => {
        const isDone = t.status === 'เสร็จเรียบร้อย';
        const orderSelect = (isAdmin && !isDone) ? buildOrderSelect(t, usedOrders, maxOrder) : '';
        return `
        <tr class="${isDone ? 'done-row' : (t.isNearDeadline ? 'near-deadline-row' : '')}">
          <td style="color:#94A3B8;font-size:13px;text-align:center;width:36px">${t.seq}</td>
          <td>
            <div class="task-name">${escHtml(t.task)}</div>
            <div class="text-muted" style="font-size:12px">${t.dateAdded||''}</div>
          </td>
          <td><span style="font-size:13px">${escHtml(t.type||'-')}</span></td>
          <td>${badgePriority(t.priority)}</td>
          <td>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${t.assignTo.split(',').map(p=>p.trim()).filter(Boolean)
                .map(p=>`<span class="badge badge-planning" style="font-size:11px">${escHtml(p)}</span>`).join('')}
            </div>
          </td>
          <td>
            <div style="font-size:13px;font-weight:500">${t.deadline||'-'}</div>
            ${daysLeftHtml(t.daysLeft)}
          </td>
          <td><span style="font-size:13px">${t.timeSlot||'-'}</span></td>
          <td>${badgeStatus(t.status)}${t.lateFinish ? ' <span style="background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px">⚠️ เสร็จช้า</span>' : ''}</td>
          <td style="min-width:100px">${progressBar(t.percent)}</td>
          <td style="white-space:nowrap">
            ${isDone ? '' : `<button class="btn btn-outline btn-sm" onclick="openEdit(${t.rowIndex})">✏️ แก้ไข</button>`}
            ${orderSelect}
            ${isAdmin ? `<button class="btn btn-sm" style="color:#7C3AED;border:1.5px solid #DDD6FE;background:white;border-radius:6px;padding:4px 10px;cursor:pointer;margin-left:2px" onclick="openAuditLog(${t.rowIndex},'${escHtml(t.task)}')">ประวัติ</button>` : ''}
            ${isAdmin ? `<button class="btn btn-sm" style="color:#EF4444;border:1.5px solid #FCA5A5;background:white;border-radius:6px;padding:4px 10px;cursor:pointer;margin-left:2px" onclick="confirmDeleteTask(${t.rowIndex},'${escHtml(t.task)}')">ลบ</button>` : ''}
          </td>
        </tr>`;
      }).join('');

      const orderHeader = isAdmin ? '<th style="width:70px">ลำดับ</th>' : '';
      return `<div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>ภารกิจ / งาน</th><th>ประเภท</th><th>ความสำคัญ</th>
          <th>Assign to</th><th>Deadline</th><th>ช่วงเวลา</th><th>สถานะ</th>
          <th>ความคืบหน้า</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }

    function buildOrderSelect(t, usedOrders, maxOrder) {
      const cur = t.adminOrder;
      let opts = `<option value="">-</option>`;
      for (let n = 1; n <= maxOrder; n++) {
        // disable ถ้าถูกใช้โดยงานอื่น (ไม่ใช่งานนี้)
        const taken = usedOrders.has(n) && cur !== n;
        opts += `<option value="${n}" ${cur === n ? 'selected' : ''} ${taken ? 'disabled' : ''}>${n}</option>`;
      }
      const cls = cur !== null ? 'order-select has-value' : 'order-select';
      return `<select class="${cls}" onchange="setAdminOrder(${t.rowIndex}, this)">${opts}</select>`;
    }

    async function setAdminOrder(rowIndex, sel) {
      const val = sel.value === '' ? '' : Number(sel.value);
      // อัปเดต local ทันที
      const t = allTasks.find(x => x.rowIndex === rowIndex);
      if (t) t.adminOrder = val === '' ? null : val;
      sel.className = val !== '' ? 'order-select has-value' : 'order-select';
      try {
        await apiPost({ action: 'updateAdminOrder', rowIndex, adminOrder: val });
        updateResetOrderBtn();
        applyFilter();
      } catch(e) {
        alert('บันทึกไม่สำเร็จ: ' + e.message);
      }
    }

    // ===== EDIT MODAL =====
    function thaiToInputDate(str) {
      if (!str) return '';
      const p = str.split('/');
      if (p.length !== 3) return '';
      return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    }

    function openEdit(rowIndex) {
      const t = allTasks.find(x => x.rowIndex === rowIndex);
      if (!t) return;
      editRowIndex = rowIndex;

      document.getElementById('eTask').value = t.task || '';
      document.getElementById('ePriority').value = t.priority || '';
      document.getElementById('eStatus').value = t.status || 'ยังไม่เริ่ม';
      document.getElementById('eStartDate').value = thaiToInputDate(t.startDate);
      document.getElementById('eDeadline').value = thaiToInputDate(t.deadline);

      const types = [...new Set(allTasks.map(x => x.type).filter(Boolean))].sort();
      document.getElementById('eType').innerHTML =
        '<option value="">-- ไม่ระบุ --</option>' +
        types.map(tp => `<option${t.type===tp?' selected':''}>${tp}</option>`).join('');

      const slots = [...new Set(allTasks.map(x => x.timeSlot).filter(Boolean))].sort();
      document.getElementById('eTimeSlot').innerHTML =
        '<option value="">-- ไม่ระบุ --</option>' +
        slots.map(s => `<option${t.timeSlot===s?' selected':''}>${s}</option>`).join('');

      const persons = [...new Set(allTasks.flatMap(x => x.assignTo.split(',').map(s=>s.trim()).filter(Boolean)))].sort();
      const assigned = t.assignTo.split(',').map(s=>s.trim()).filter(Boolean);
      document.getElementById('eAssignWrap').innerHTML = persons.map(p => `
        <label style="display:flex;align-items:center;gap:6px;padding:5px 10px;border:1.5px solid #E2E8F0;border-radius:8px;cursor:pointer;font-size:13px;user-select:none">
          <input type="checkbox" value="${escHtml(p)}" ${assigned.includes(p)?'checked':''} style="width:14px;height:14px">
          ${escHtml(p)}
        </label>`).join('');

      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit() {
      const t = allTasks.find(x => x.rowIndex === editRowIndex);
      if (!t) return;
      const btn = document.getElementById('editSaveBtn');
      btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';

      const status  = document.getElementById('eStatus').value;
      const percent = PERCENT_MAP[status] || t.percent || '0%';
      const isDone  = status === 'เสร็จเรียบร้อย';
      const wasDone = t.status === 'เสร็จเรียบร้อย';
      const doneDate = isDone ? (wasDone ? (t.doneDate || '') : todayStr()) : '';
      const assignTo = [...document.querySelectorAll('#eAssignWrap input:checked')].map(i=>i.value).join(', ');

      try {
        await apiPost({
          action:    'editTask',
          rowIndex:  editRowIndex,
          editor:    user.name || user.username || '',
          task:      document.getElementById('eTask').value.trim(),
          type:      document.getElementById('eType').value,
          priority:  document.getElementById('ePriority').value,
          assignTo,
          startDate: document.getElementById('eStartDate').value,
          deadline:  document.getElementById('eDeadline').value,
          timeSlot:  document.getElementById('eTimeSlot').value,
          status, percent, doneDate
        });
        closeEditModal();
        await loadAll();
      } catch(e) {
        alert('บันทึกไม่สำเร็จ: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '💾 บันทึก';
      }
    }

    // ===== AUDIT LOG MODAL =====

            </tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`;

    function closeAuditModal() { document.getElementById('auditModal').style.display = 'none'; }

    // keep closeModal alias (used nowhere now but safe to keep)
    function closeModal() { closeEditModal(); }

    function fmtDateThai(d) {
      const thai = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
      return `${String(thai.getDate()).padStart(2,'0')}/${String(thai.getMonth()+1).padStart(2,'0')}/${thai.getFullYear()}`;
    }
    function todayStr() { return fmtDateThai(new Date()); }
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // แสดง/ซ่อนปุ่มรีเซ็ตลำดับ (เฉพาะ admin และมีลำดับที่กำหนดอยู่)
    function updateResetOrderBtn() {
      const btn = document.getElementById('resetOrderBtn');
      if (!btn) return;
      const isAdmin = user && user.role === 'admin';
      const hasOrder = allTasks.some(t => t.adminOrder !== null);
      btn.style.display = (isAdmin && hasOrder) ? 'inline-flex' : 'none';
    }

    async function resetAllOrders() {
      if (!confirm('ล้างลำดับที่กำหนดทั้งหมดใช่ไหม?')) return;
      const btn = document.getElementById('resetOrderBtn');
      btn.disabled = true; btn.textContent = '⏳ กำลังรีเซ็ต...';
      try {
        await apiPost({ action: 'resetAllOrders' });
        allTasks.forEach(t => t.adminOrder = null);
        updateResetOrderBtn();
        applyFilter();
      } catch(e) {
        alert('รีเซ็ตไม่สำเร็จ: ' + e.message);
      } finally {
        btn.disabled = false; btn.innerHTML = '🔄 รีเซ็ตลำดับ';
      }
    }

    async function confirmDeleteTask(rowIndex, taskName) {
      if (!confirm(`ลบงาน "${taskName}" ออกจากระบบและ Google Sheet ใช่ไหม?\n⚠️ ไม่สามารถกู้คืนได้`)) return;
      try {
        await apiPost({ action: 'deleteTask', rowIndex });
        await loadAll();
      } catch(e) {
        alert('ลบไม่สำเร็จ: ' + e.message);
      }
    }

    async function emergencyRefresh() {
      const btn = document.getElementById('emergencyRefreshBtn');
      btn.disabled = true;
      btn.innerHTML = '⏳ <span>กำลังโหลด...</span>';
      btn.style.background = '#991B1B';
      await resetAndLoad();
      btn.innerHTML = '✅ <span>โหลดแล้ว!</span>';
      btn.style.background = '#16A34A';
      setTimeout(() => {
        btn.innerHTML = '🔄 <span>กดทุกครั้งก่อนเริ่มทำงาน</span>';
        btn.style.background = '#DC2626';
        btn.disabled = false;
      }, 1500);
    }

    init();
  </script>
</body>
</html>
