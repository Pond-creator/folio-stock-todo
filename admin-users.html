<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - จัดการ User</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .role-badge { display:inline-block; padding:2px 10px; border-radius:99px; font-size:12px; font-weight:700; }
    .role-admin { background:#DBEAFE; color:#1E40AF; }
    .role-staff { background:#FEF3C7; color:#92400E; }
    .role-user  { background:#DCFCE7; color:#166534; }
    .user-table td { vertical-align:middle; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">
    <div class="grid-2">

      <!-- ฟอร์มเพิ่ม User -->
      <div class="card">
        <div class="card-header"><span class="card-title">➕ เพิ่มผู้ใช้ใหม่</span></div>
        <div class="card-body">
          <div class="form-group">
            <label>ชื่อผู้ใช้ (username) <span style="color:red">*</span></label>
            <input type="text" id="uUsername" placeholder="เช่น john123">
          </div>
          <div class="form-group">
            <label>รหัสผ่าน <span style="color:red">*</span></label>
            <input type="password" id="uPassword" placeholder="รหัสผ่าน">
          </div>
          <div class="form-group">
            <label>สิทธิ์ <span style="color:red">*</span></label>
            <select id="uRole">
              <option value="" disabled selected>-- เลือกสิทธิ์ --</option>
              <option value="admin">Admin</option>
              <option value="staff">Staff</option>
              <option value="user">User</option>
              <option value="monitor">Monitor</option>
            </select>
          </div>
          <div class="form-group">
            <label>ชื่อที่แสดง <span style="color:red">*</span></label>
            <input type="text" id="uDisplayName" placeholder="เช่น สมชาย ใจดี">
          </div>
          <div id="addUserError" style="display:none;color:#EF4444;font-size:13px;margin-bottom:8px"></div>
          <button class="btn btn-primary btn-full" id="addUserBtn" onclick="addUser()">➕ เพิ่มผู้ใช้</button>
        </div>
      </div>

      <!-- รายชื่อ User -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">👥 รายชื่อผู้ใช้ทั้งหมด</span>
          <button class="btn btn-outline btn-sm" onclick="loadUsers()">🔄 รีเฟรช</button>
        </div>
        <div id="userContainer">
          <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div id="resetPassModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeResetPass()">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">🔑 Reset รหัสผ่าน</span>
        <button class="modal-close" onclick="closeResetPass()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;font-weight:600;color:#0F172A;margin-bottom:16px">ผู้ใช้: <span id="resetPassName"></span></p>
        <div class="form-group" style="margin-bottom:0">
          <label>รหัสผ่านใหม่ <span style="color:red">*</span></label>
          <input type="password" id="newPassInput" placeholder="กรอกรหัสผ่านใหม่" onkeydown="if(event.key==='Enter')saveNewPassword()">
        </div>
        <div id="resetPassError" style="display:none;color:#EF4444;font-size:13px;margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeResetPass()">ยกเลิก</button>
        <button class="btn btn-primary" id="savePassBtn" onclick="saveNewPassword()">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">ยืนยันการลบ</span>
        <button class="modal-close" onclick="closeConfirm()">✕</button>
      </div>
      <div class="modal-body">
        <p>คุณต้องการลบผู้ใช้ <strong id="confirmName"></strong> ออกจากระบบ?</p>
        <p style="font-size:13px;color:#EF4444">⚠️ ไม่สามารถกู้คืนได้</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeConfirm()">ยกเลิก</button>
        <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">ลบ</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const SUPER_ADMIN = 'pond';  // บัญชีผู้ดูแลสูงสุด
    let user, deleteTarget = null, resetTarget = null;

    async function init() {
      user = requireAuth('admin');
      if (!user) return;
      setNavUser(user);
      renderNav('users');
      await loadUsers();
    }

    async function loadUsers() {
      document.getElementById('userContainer').innerHTML =
        '<div class="loading"><div class="spinner"></div> กำลังโหลด...</div>';
      try {
        const r = await apiGet({ action: 'getUsers' });
        if (r.success) renderUsers(r.users);
        else showError('userContainer', r.message || 'โหลดไม่สำเร็จ');
      } catch(e) { showError('userContainer', e.message); }
    }

    function renderUsers(users) {
      if (!users.length) {
        document.getElementById('userContainer').innerHTML =
          '<div class="empty-state"><span class="icon">👤</span><p>ยังไม่มีผู้ใช้</p></div>';
        return;
      }
      const roleLabel = { admin:'Admin', staff:'Staff', user:'User', monitor:'Monitor' };
      const iAmSuper = user.username.toLowerCase() === SUPER_ADMIN;
      const rows = users.map(u => {
        const isSuper = u.username.toLowerCase() === SUPER_ADMIN;
        const isSelf  = u.username === user.username;
        let actions;
        if (isSuper && !iAmSuper) {
          // คนอื่นเห็นบัญชี pond → แตะไม่ได้
          actions = `<span style="font-size:12px;color:#94A3B8">🔒 ผู้ดูแลสูงสุด</span>`;
        } else {
          const resetBtn = `<button class="btn btn-outline btn-sm" style="margin-right:6px"
              onclick="openResetPass('${escHtml(u.username)}','${escHtml(u.displayName||u.username)}')">🔑 Reset</button>`;
          const delBtn = isSelf
            ? `<span style="font-size:12px;color:#94A3B8">(บัญชีตัวเอง)</span>`
            : `<button class="btn btn-outline btn-sm" style="color:#EF4444;border-color:#FCA5A5"
                onclick="openConfirm(${u.rowIndex},'${escHtml(u.displayName||u.username)}')">ลบ</button>`;
          actions = resetBtn + delBtn;
        }
        return `
        <tr>
          <td style="font-weight:600;font-size:13px">${escHtml(u.displayName || u.username)}${isSuper ? ' 👑' : ''}</td>
          <td style="font-size:13px;color:#64748B">${escHtml(u.username)}</td>
          <td><span class="role-badge role-${u.role}">${roleLabel[u.role]||u.role}</span></td>
          <td style="white-space:nowrap">${actions}</td>
        </tr>`;
      }).join('');

      document.getElementById('userContainer').innerHTML = `
        <div class="table-wrap"><table class="user-table">
          <thead><tr><th>ชื่อที่แสดง</th><th>Username</th><th>สิทธิ์</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
    }

    // ===== RESET PASSWORD =====
    function openResetPass(username, displayName) {
      resetTarget = { username, displayName };
      document.getElementById('resetPassName').textContent = displayName + ' (' + username + ')';
      document.getElementById('newPassInput').value = '';
      document.getElementById('resetPassError').style.display = 'none';
      document.getElementById('resetPassModal').style.display = 'flex';
      setTimeout(() => document.getElementById('newPassInput').focus(), 100);
    }
    function closeResetPass() {
      resetTarget = null;
      document.getElementById('resetPassModal').style.display = 'none';
    }
    async function saveNewPassword() {
      const newPass = document.getElementById('newPassInput').value.trim();
      const errEl = document.getElementById('resetPassError');
      if (!newPass) { errEl.textContent = 'กรุณากรอกรหัสผ่านใหม่'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('savePassBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      errEl.style.display = 'none';
      try {
        const r = await apiPost({ action: 'updateUserPassword', username: resetTarget.username, newPassword: newPass, editor: user.username });
        if (r.success) {
          closeResetPass();
          alert(`✅ Reset รหัสผ่านของ ${resetTarget.displayName} เรียบร้อยแล้ว`);
        } else {
          errEl.textContent = r.message || 'บันทึกไม่สำเร็จ';
          errEl.style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'บันทึก';
      }
    }

    // ===== ADD USER =====
    async function addUser() {
      const username    = document.getElementById('uUsername').value.trim();
      const password    = document.getElementById('uPassword').value.trim();
      const role        = document.getElementById('uRole').value;
      const displayName = document.getElementById('uDisplayName').value.trim();
      const errEl = document.getElementById('addUserError');
      errEl.style.display = 'none';
      if (!username || !password || !role || !displayName) {
        errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
        errEl.style.display = 'block'; return;
      }
      const btn = document.getElementById('addUserBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const r = await apiPost({ action: 'addUser', username, password, role, displayName });
        if (r.success) {
          document.getElementById('uUsername').value = '';
          document.getElementById('uPassword').value = '';
          document.getElementById('uRole').value = '';
          document.getElementById('uDisplayName').value = '';
          await loadUsers();
        } else {
          errEl.textContent = r.message || 'เพิ่มไม่สำเร็จ';
          errEl.style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = '➕ เพิ่มผู้ใช้';
      }
    }

    // ===== DELETE USER =====
    function openConfirm(rowIndex, name) {
      deleteTarget = rowIndex;
      document.getElementById('confirmName').textContent = name;
      document.getElementById('confirmModal').style.display = 'flex';
    }
    function closeConfirm() {
      deleteTarget = null;
      document.getElementById('confirmModal').style.display = 'none';
    }
    async function confirmDelete() {
      if (!deleteTarget) return;
      const btn = document.getElementById('confirmDeleteBtn');
      btn.disabled = true; btn.textContent = 'กำลังลบ...';
      try {
        await apiPost({ action: 'deleteUser', rowIndex: deleteTarget });
        closeConfirm();
        await loadUsers();
      } catch(e) {
        alert('ลบไม่สำเร็จ: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'ลบ';
      }
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    init();
  </script>
</body>
</html>
