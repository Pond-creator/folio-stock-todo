<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - จัดการ User</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .role-badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
    }
    .role-admin { background: #DBEAFE; color: #1E40AF; }
    .role-staff { background: #FEF3C7; color: #92400E; }
    .role-user  { background: #DCFCE7; color: #166534; }
    .user-table td { vertical-align: middle; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">
    <div class="grid-2">

      <!-- ฟอร์มเพิ่ม User -->
      <div class="card">
        <div class="card-header"><span class="card-title">➕ เพิ่มผู้ใช้ใหม่</span></div>
        <div class="card-body">
          <div class="form-group">
            <label>ชื่อผู้ใช้ (username) <span style="color:red">*</span></label>
            <input type="text" id="uUsername" placeholder="เช่น john123">
          </div>
          <div class="form-group">
            <label>รหัสผ่าน <span style="color:red">*</span></label>
            <input type="password" id="uPassword" placeholder="รหัสผ่าน">
          </div>
          <div class="form-group">
            <label>สิทธิ์ <span style="color:red">*</span></label>
            <select id="uRole">
              <option value="" disabled selected>-- เลือกสิทธิ์ --</option>
              <option value="admin">Admin</option>
              <option value="staff">Staff</option>
              <option value="user">User</option>
            </select>
          </div>
          <div class="form-group">
            <label>ชื่อที่แสดง <span style="color:red">*</span></label>
            <input type="text" id="uDisplayName" placeholder="เช่น สมชาย ใจดี">
          </div>
          <div id="addUserError" style="display:none;color:#EF4444;font-size:13px;margin-bottom:8px"></div>
          <button class="btn btn-primary btn-full" id="addUserBtn" onclick="addUser()">➕ เพิ่มผู้ใช้</button>
        </div>
      </div>

      <!-- รายชื่อ User -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">👥 รายชื่อผู้ใช้ทั้งหมด</span>
          <button class="btn btn-outline btn-sm" onclick="loadUsers()">🔄 รีเฟรช</button>
        </div>
        <div id="userContainer">
          <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Verify Admin Password Modal -->
  <div id="verifyModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVerify()">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">🔐 ยืนยันตัวตน</span>
        <button class="modal-close" onclick="closeVerify()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:#374151;margin-bottom:12px">กรอกรหัสผ่านของคุณเพื่อดู/แก้ไขรหัสผ่านของ <strong id="verifyTargetName"></strong></p>
        <div class="form-group" style="margin-bottom:0">
          <label>รหัสผ่านของคุณ</label>
          <input type="password" id="adminPasswordInput" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter')submitVerify()">
        </div>
        <div id="verifyError" style="display:none;color:#EF4444;font-size:13px;margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeVerify()">ยกเลิก</button>
        <button class="btn btn-primary" id="verifyBtn" onclick="submitVerify()">ยืนยัน</button>
      </div>
    </div>
  </div>

  <!-- Edit Password Modal -->
  <div id="editPassModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditPass()">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">✏️ แก้ไขรหัสผ่าน</span>
        <button class="modal-close" onclick="closeEditPass()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;font-weight:600;color:#0F172A;margin-bottom:16px">ผู้ใช้: <span id="editPassName"></span></p>
        <div class="form-group">
          <label>รหัสผ่านปัจจุบัน</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="text" id="currentPassDisplay" readonly
              style="background:#F8FAFC;color:#374151;font-weight:600;flex:1">
            <button class="btn btn-outline btn-sm" onclick="togglePassVisibility()"
              id="togglePassBtn" title="แสดง/ซ่อน">👁</button>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>รหัสผ่านใหม่ (ถ้าต้องการเปลี่ยน)</label>
          <input type="password" id="newPassInput" placeholder="กรอกรหัสผ่านใหม่">
        </div>
        <div id="editPassError" style="display:none;color:#EF4444;font-size:13px;margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEditPass()">ปิด</button>
        <button class="btn btn-primary" id="savePassBtn" onclick="saveNewPassword()">บันทึกรหัสใหม่</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">ยืนยันการลบ</span>
        <button class="modal-close" onclick="closeConfirm()">✕</button>
      </div>
      <div class="modal-body">
        <p>คุณต้องการลบผู้ใช้ <strong id="confirmName"></strong> ออกจากระบบ?</p>
        <p style="font-size:13px;color:#EF4444">⚠️ ไม่สามารถกู้คืนได้</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeConfirm()">ยกเลิก</button>
        <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">ลบ</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    let user, deleteTarget = null, editTarget = null, allUsers = [];

    async function init() {
      user = requireAuth('admin');
      if (!user) return;
      setNavUser(user);
      renderNav('users');
      await loadUsers();
    }

    async function loadUsers() {
      document.getElementById('userContainer').innerHTML =
        '<div class="loading"><div class="spinner"></div> กำลังโหลด...</div>';
      try {
        const r = await apiGet({ action: 'getUsers' });
        if (r.success) renderUsers(r.users);
        else showError('userContainer', r.message || 'โหลดไม่สำเร็จ');
      } catch(e) { showError('userContainer', e.message); }
    }

    function renderUsers(users) {
      allUsers = users;
      if (!users.length) {
        document.getElementById('userContainer').innerHTML =
          '<div class="empty-state"><span class="icon">👤</span><p>ยังไม่มีผู้ใช้</p></div>';
        return;
      }
      const roleLabel = { admin:'Admin', staff:'Staff', user:'User' };
      const rows = users.map(u => `
        <tr>
          <td>
            <span style="font-weight:600;font-size:13px;color:#2563EB;cursor:pointer;text-decoration:underline"
              onclick="openVerify('${escHtml(u.username)}','${escHtml(u.displayName||u.username)}')"
              title="คลิกเพื่อดู/แก้ไขรหัสผ่าน">
              ${escHtml(u.displayName || u.username)}
            </span>
          </td>
          <td style="font-size:13px;color:#64748B">${escHtml(u.username)}</td>
          <td><span class="role-badge role-${u.role}">${roleLabel[u.role]||u.role}</span></td>
          <td>
            ${u.username !== user.username
              ? `<button class="btn btn-outline btn-sm" style="color:#EF4444;border-color:#FCA5A5"
                  onclick="openConfirm(${u.rowIndex},'${escHtml(u.displayName||u.username)}')">ลบ</button>`
              : `<span style="font-size:12px;color:#94A3B8">(บัญชีตัวเอง)</span>`}
          </td>
        </tr>`).join('');

      document.getElementById('userContainer').innerHTML = `
        <div class="table-wrap"><table class="user-table">
          <thead><tr><th>ชื่อที่แสดง</th><th>Username</th><th>สิทธิ์</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
    }

    // ===== VERIFY + EDIT PASSWORD =====
    function openVerify(username, displayName) {
      editTarget = { username, displayName };
      document.getElementById('verifyTargetName').textContent = displayName;
      document.getElementById('adminPasswordInput').value = '';
      document.getElementById('verifyError').style.display = 'none';
      document.getElementById('verifyModal').style.display = 'flex';
      setTimeout(() => document.getElementById('adminPasswordInput').focus(), 100);
    }
    function closeVerify() {
      editTarget = null;
      document.getElementById('verifyModal').style.display = 'none';
    }

    async function submitVerify() {
      const pwd = document.getElementById('adminPasswordInput').value.trim();
      const errEl = document.getElementById('verifyError');
      if (!pwd) { errEl.textContent = 'กรุณากรอกรหัสผ่าน'; errEl.style.display = 'block'; return; }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';
      errEl.style.display = 'none';
      try {
        // ยืนยันด้วย login API
        const r = await apiGet({ action: 'login', username: user.username, password: pwd });
        if (r.success) {
          closeVerify();
          openEditPass(pwd);
        } else {
          errEl.textContent = 'รหัสผ่านไม่ถูกต้อง';
          errEl.style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'ยืนยัน';
      }
    }

    async function openEditPass(adminPwd) {
      // ดึง password ของ user จาก sheet ผ่าน getUsers (เก็บไว้ใน allUsers ไม่มี password)
      // ต้องดึงใหม่โดยตรงจาก API พิเศษ หรือแสดงแค่ตัว *** แล้วให้เปลี่ยนใหม่
      document.getElementById('editPassName').textContent = editTarget.displayName + ' (' + editTarget.username + ')';
      document.getElementById('currentPassDisplay').value = '••••••••';
      document.getElementById('currentPassDisplay').type = 'password';
      document.getElementById('newPassInput').value = '';
      document.getElementById('editPassError').style.display = 'none';
      document.getElementById('editPassModal').style.display = 'flex';
    }
    function closeEditPass() {
      document.getElementById('editPassModal').style.display = 'none';
    }
    function togglePassVisibility() {
      const inp = document.getElementById('currentPassDisplay');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function saveNewPassword() {
      const newPass = document.getElementById('newPassInput').value.trim();
      const errEl = document.getElementById('editPassError');
      if (!newPass) { errEl.textContent = 'กรุณากรอกรหัสผ่านใหม่'; errEl.style.display = 'block'; return; }

      const btn = document.getElementById('savePassBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      errEl.style.display = 'none';
      try {
        const r = await apiPost({ action: 'updateUserPassword', username: editTarget.username, newPassword: newPass });
        if (r.success) {
          closeEditPass();
          alert(`✅ เปลี่ยนรหัสผ่านของ ${editTarget.displayName} เรียบร้อยแล้ว`);
        } else {
          errEl.textContent = r.message || 'บันทึกไม่สำเร็จ';
          errEl.style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'บันทึกรหัสใหม่';
      }
    }

    async function addUser() {
      const username    = document.getElementById('uUsername').value.trim();
      const password    = document.getElementById('uPassword').value.trim();
      const role        = document.getElementById('uRole').value;
      const displayName = document.getElementById('uDisplayName').value.trim();
      const errEl = document.getElementById('addUserError');
      errEl.style.display = 'none';

      if (!username || !password || !role || !displayName) {
        errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
        errEl.style.display = 'block'; return;
      }

      const btn = document.getElementById('addUserBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const r = await apiPost({ action: 'addUser', username, password, role, displayName });
        if (r.success) {
          document.getElementById('uUsername').value = '';
          document.getElementById('uPassword').value = '';
          document.getElementById('uRole').value = '';
          document.getElementById('uDisplayName').value = '';
          await loadUsers();
        } else {
          errEl.textContent = r.message || 'เพิ่มไม่สำเร็จ';
          errEl.style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = '➕ เพิ่มผู้ใช้';
      }
    }

    function openConfirm(rowIndex, name) {
      deleteTarget = rowIndex;
      document.getElementById('confirmName').textContent = name;
      document.getElementById('confirmModal').style.display = 'flex';
    }
    function closeConfirm() {
      deleteTarget = null;
      document.getElementById('confirmModal').style.display = 'none';
    }
    async function confirmDelete() {
      if (!deleteTarget) return;
      const btn = document.getElementById('confirmDeleteBtn');
      btn.disabled = true; btn.textContent = 'กำลังลบ...';
      try {
        await apiPost({ action: 'deleteUser', rowIndex: deleteTarget });
        closeConfirm();
        await loadUsers();
      } catch(e) {
        alert('ลบไม่สำเร็จ: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'ลบ';
      }
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    init();
  </script>
</body>
</html>
