<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - มอบหมายงาน</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    select:invalid, select option[value=""] { color: #9CA3AF; }
    select option:not([value=""]) { color: #0F172A; }

    /* ===== MULTI-SELECT DROPDOWN ===== */
    .ms-wrap { position: relative; }
    .ms-btn {
      width: 100%; padding: 8px 12px; border: 1.5px solid #E2E8F0;
      border-radius: 8px; background: white; text-align: left;
      font-family: Sarabun, sans-serif; font-size: 14px; color: #0F172A;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .ms-btn:focus { outline: none; border-color: #2563EB; }
    .ms-btn.placeholder { color: #9CA3AF; }
    .ms-dropdown {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: white; border: 1.5px solid #E2E8F0; border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 100; max-height: 220px; overflow-y: auto;
    }
    .ms-dropdown.open { display: block; }
    .ms-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; cursor: pointer; font-size: 14px; color: #0F172A;
      transition: background .1s;
    }
    .ms-item:hover { background: #F1F5F9; }
    .ms-item input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563EB; }
    .ms-item.selected { background: #EFF6FF; color: #1E40AF; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">
    <!-- ===== ASSIGN TASK ===== -->
    <div id="sectionTask">
      <div class="grid-2">
        <!-- Form -->
        <div class="card">
          <div class="card-header"><span class="card-title">➕ สร้างงานใหม่</span></div>
          <div class="card-body">
            <div class="form-group">
              <label>ภารกิจ / งาน <span style="color:red">*</span></label>
              <textarea id="aTask" rows="2" placeholder="ระบุรายละเอียดงาน..."></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>ประเภทงาน <span style="color:red">*</span></label>
                <div class="ms-wrap" id="wrap-aType">
                  <button type="button" class="ms-btn placeholder" id="btn-aType" onclick="toggleMs('aType')">
                    <span id="label-aType">-- เลือก --</span><span>▾</span>
                  </button>
                  <div class="ms-dropdown" id="dd-aType"></div>
                </div>
              </div>
              <div class="form-group">
                <label>ความสำคัญ <span style="color:red">*</span></label>
                <select id="aPriority"></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>เริ่มทำวันที่ <span style="color:red">*</span></label>
                <input type="date" id="aStartDate">
              </div>
              <div class="form-group">
                <label>วันที่ Deadline <span style="color:red">*</span></label>
                <input type="date" id="aDeadline">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>ช่วงเวลาดำเนินงาน <span style="color:red">*</span></label>
                <div class="ms-wrap" id="wrap-aTimeSlot">
                  <button type="button" class="ms-btn placeholder" id="btn-aTimeSlot" onclick="toggleMs('aTimeSlot')">
                    <span id="label-aTimeSlot">-- เลือก --</span><span>▾</span>
                  </button>
                  <div class="ms-dropdown" id="dd-aTimeSlot"></div>
                </div>
              </div>
            </div>
            <div class="form-group">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <label style="margin:0">Assign ให้ <span style="color:red">*</span></label>
                <div style="display:flex;gap:6px">
                  <button type="button" class="btn btn-outline btn-sm" onclick="selectAllAssignees()">เลือกทุกคน</button>
                  <button type="button" class="btn btn-outline btn-sm" onclick="clearAllAssignees()">ล้าง</button>
                </div>
              </div>
              <div class="checkbox-grid" id="assigneeGrid">
                <div class="loading" style="padding:8px"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div></div>
              </div>
            </div>
            <div id="assignError" class="error-msg" style="display:none"></div>
            <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="confirmTask()">
              📤 มอบหมายงาน
            </button>
          </div>
        </div>

        <!-- Recent assigned -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">งานที่มอบหมายล่าสุด</span>
            <button class="btn btn-outline btn-sm" id="btnRefreshRecent" onclick="refreshRecent(this)">🔄</button>
          </div>
          <div id="recentContainer">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== TAB: OT PLAN ===== -->
  </div>

  <!-- CONFIRM MODAL -->
  <div id="confirmModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <span class="modal-title">✅ ยืนยันการมอบหมายงาน</span>
        <button class="modal-close" onclick="closeConfirm()">✕</button>
      </div>
      <div class="modal-body">
        <table style="width:100%;border-collapse:collapse;font-size:14px">
          <tr><td style="padding:7px 0;color:#64748B;width:130px">📝 ภารกิจ</td><td id="cf_task" style="font-weight:600;color:#0F172A"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">📦 ประเภท</td><td id="cf_type"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">🔥 ความสำคัญ</td><td id="cf_priority"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">📅 เริ่มทำวันที่</td><td id="cf_start"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">⏰ Deadline</td><td id="cf_deadline"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">🕐 ช่วงเวลา</td><td id="cf_timeslot"></td></tr>
          <tr><td style="padding:7px 0;color:#64748B">👥 Assign ให้</td><td id="cf_assign"></td></tr>
        </table>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnEdit" onclick="closeConfirm()">✏️ แก้ไข</button>
        <button class="btn btn-primary" id="btnConfirm" onclick="submitTask()">✅ ยืนยัน มอบหมายงาน</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    let user, baseData = {}, allAssignees = [];

    async function init() {
      user = requireAuth(['admin', 'staff']);
      if (!user) return;
      setNavUser(user);
      renderNav('assign');

      // โหลด base จาก cache ก่อน (เร็ว) แล้วค่อย fetch จริงพร้อมกัน
      const cached = sessionStorage.getItem('baseData');
      if (cached) {
        applyBase(JSON.parse(cached));
      }

      // โหลดพร้อมกัน
      await Promise.all([loadBase(), loadRecentTasks()]);
    }

    async function loadBase() {
      try {
        const r = await apiGet({ action: 'getBase' });
        if (!r.success) {
          if (!sessionStorage.getItem('baseData'))
            document.getElementById('assigneeGrid').innerHTML = '<span style="color:#EF4444;font-size:13px">⚠️ โหลดข้อมูลไม่สำเร็จ กด รีเฟรช</span>';
          return;
        }
        sessionStorage.setItem('baseData', JSON.stringify(r.base));
        applyBase(r.base);
      } catch (e) {
        if (!sessionStorage.getItem('baseData'))
          document.getElementById('assigneeGrid').innerHTML = '<span style="color:#EF4444;font-size:13px">⚠️ ไม่สามารถเชื่อมต่อได้ กรุณารอแล้วลองใหม่</span>';
      }
    }

    function applyBase(base) {
      baseData = base;
      allAssignees = base.assignees;
      fillMs('aType', base.taskTypes);
      fillSelect('aPriority', base.priorities);
      fillMs('aTimeSlot', base.timeSlots);
      renderAssigneeGrid(base.assignees);
    }

    function fillSelect(id, arr) {
      const el = document.getElementById(id);
      if (el) el.innerHTML =
        `<option value="" disabled selected style="color:#9CA3AF">-- เลือก --</option>` +
        arr.map(v => `<option>${escHtml(v)}</option>`).join('');
    }

    // ===== MULTI-SELECT HELPERS =====
    function fillMs(id, arr) {
      const dd = document.getElementById('dd-' + id);
      if (!dd) return;
      dd.innerHTML = arr.map(v => `
        <label class="ms-item" onclick="toggleMsItem(this,'${id}')">
          <input type="checkbox" value="${escHtml(v)}" onclick="event.stopPropagation()">
          <span>${escHtml(v)}</span>
        </label>`).join('');
    }

    function toggleMs(id) {
      const dd = document.getElementById('dd-' + id);
      const isOpen = dd.classList.contains('open');
      // ปิด dropdown อื่นทั้งหมดก่อน
      document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) dd.classList.add('open');
    }

    function toggleMsItem(label, id) {
      const cb = label.querySelector('input');
      cb.checked = !cb.checked;
      label.classList.toggle('selected', cb.checked);
      updateMsLabel(id);
    }

    function updateMsLabel(id) {
      const checked = getMsValues(id);
      const btn = document.getElementById('btn-' + id);
      const lbl = document.getElementById('label-' + id);
      if (checked.length === 0) {
        lbl.textContent = '-- เลือก --';
        btn.classList.add('placeholder');
      } else {
        lbl.textContent = checked.join(', ');
        btn.classList.remove('placeholder');
      }
    }

    function getMsValues(id) {
      return [...document.querySelectorAll(`#dd-${id} input:checked`)].map(i => i.value);
    }

    function clearMs(id) {
      document.querySelectorAll(`#dd-${id} input`).forEach(i => {
        i.checked = false;
        i.closest('.ms-item').classList.remove('selected');
      });
      updateMsLabel(id);
    }

    // ปิด dropdown เมื่อคลิกข้างนอก
    document.addEventListener('click', e => {
      if (!e.target.closest('.ms-wrap')) {
        document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
      }
    });

    function renderAssigneeGrid(assignees) {
      document.getElementById('assigneeGrid').innerHTML = assignees.map(a => `
        <label class="checkbox-item" onclick="toggleCheck(this)">
          <input type="checkbox" value="${escHtml(a)}">
          <span>${escHtml(a)}</span>
        </label>`).join('');
    }

    function toggleCheck(el) {
      el.classList.toggle('checked', el.querySelector('input').checked);
    }

    function selectAllAssignees() {
      document.querySelectorAll('#assigneeGrid input').forEach(i => {
        i.checked = true;
        i.closest('.checkbox-item').classList.add('checked');
      });
    }

    function clearAllAssignees() {
      document.querySelectorAll('#assigneeGrid input').forEach(i => {
        i.checked = false;
        i.closest('.checkbox-item').classList.remove('checked');
      });
    }

    async function loadRecentTasks() {
      // แสดง cache ก่อนถ้ามี
      const cached = sessionStorage.getItem('recentTasks');
      if (cached) renderRecentTasks(JSON.parse(cached));
      else document.getElementById('recentContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        const r = await apiGet({ action: 'getTasks', role: 'admin' });
        if (!r.success) return;
        const recent = r.tasks.slice(-10).reverse();
        sessionStorage.setItem('recentTasks', JSON.stringify(recent));
        renderRecentTasks(recent);
      } catch (e) {
        if (!sessionStorage.getItem('recentTasks'))
          document.getElementById('recentContainer').innerHTML = '<div style="padding:16px;color:#EF4444;font-size:13px">⚠️ โหลดไม่สำเร็จ กรุณากด 🔄</div>';
      }
    }

    function renderRecentTasks(recent) {
        if (!recent.length) {
          document.getElementById('recentContainer').innerHTML = '<div class="empty-state"><span class="icon">📋</span><p>ยังไม่มีงาน</p></div>';
          return;
        }
        const rows = recent.map(t => `
          <tr>
            <td><div style="font-weight:500;font-size:13px">${escHtml(t.task)}</div></td>
            <td>${badgePriority(t.priority)}</td>
            <td style="font-size:13px;white-space:nowrap;color:#374151">${t.startDate || '-'}</td>
            <td>
              <div style="display:flex;flex-wrap:wrap;gap:3px">
                ${t.assignTo.split(',').map(p=>p.trim()).filter(Boolean)
                  .map(p=>`<span class="badge badge-planning" style="font-size:11px">${escHtml(p)}</span>`).join('')}
              </div>
            </td>
            <td>${badgeStatus(t.status)}</td>
          </tr>`).join('');

        document.getElementById('recentContainer').innerHTML = `
          <div class="table-wrap">
            <table>
              <thead><tr><th>ภารกิจ</th><th>ความสำคัญ</th><th>เริ่มงาน</th><th>Assign</th><th>สถานะ</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
    }

    function confirmTask() {
      const task      = document.getElementById('aTask').value.trim();
      const types     = getMsValues('aType');
      const priority  = document.getElementById('aPriority').value;
      const startDate = document.getElementById('aStartDate').value;
      const deadline  = document.getElementById('aDeadline').value;
      const timeSlots = getMsValues('aTimeSlot');
      const checked   = [...document.querySelectorAll('#assigneeGrid input:checked')].map(i => i.value);

      if (!task)            { showErr('assignError', '❌ กรุณากรอกภารกิจ / งาน'); return; }
      if (!types.length)    { showErr('assignError', '❌ กรุณาเลือกประเภทงาน'); return; }
      if (!priority)        { showErr('assignError', '❌ กรุณาเลือกความสำคัญ'); return; }
      if (!startDate)       { showErr('assignError', '❌ กรุณาเลือกวันที่เริ่มทำ'); return; }
      if (!deadline)        { showErr('assignError', '❌ กรุณาเลือกวันที่ Deadline'); return; }
      if (!timeSlots.length){ showErr('assignError', '❌ กรุณาเลือกช่วงเวลาดำเนินงาน'); return; }
      if (!checked.length)  { showErr('assignError', '❌ กรุณาเลือกผู้รับงานอย่างน้อย 1 คน'); return; }

      document.getElementById('cf_task').textContent     = task;
      document.getElementById('cf_type').textContent     = types.join(', ');
      document.getElementById('cf_priority').innerHTML   = badgePriority(priority);
      document.getElementById('cf_start').textContent    = fmtThai(startDate);
      document.getElementById('cf_deadline').textContent = fmtThai(deadline);
      document.getElementById('cf_timeslot').textContent = timeSlots.join(', ');
      document.getElementById('cf_assign').innerHTML     = checked.map(p =>
        `<span class="badge badge-planning" style="font-size:12px;margin:2px">${escHtml(p)}</span>`).join('');
      document.getElementById('confirmModal').style.display = 'flex';
    }

    async function refreshRecent(btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle"></span>';
      sessionStorage.removeItem('recentTasks'); // ล้าง cache บังคับโหลดใหม่
      await loadRecentTasks();
      btn.disabled = false;
      btn.innerHTML = '🔄';
    }

    function closeConfirm() {
      document.getElementById('confirmModal').style.display = 'none';
    }

    async function submitTask() {
      const task      = document.getElementById('aTask').value.trim();
      const types     = getMsValues('aType');
      const priority  = document.getElementById('aPriority').value;
      const startDate = document.getElementById('aStartDate').value;
      const deadline  = document.getElementById('aDeadline').value;
      const timeSlots = getMsValues('aTimeSlot');
      const checked   = [...document.querySelectorAll('#assigneeGrid input:checked')].map(i => i.value);
      const today = todayStr();

      // แสดง loading บนปุ่มยืนยัน
      const btnConfirm = document.getElementById('btnConfirm');
      const btnEdit = document.getElementById('btnEdit');
      btnConfirm.disabled = true;
      btnConfirm.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span> กำลังบันทึก...';
      btnEdit.disabled = true;

      try {
        await apiPost({
          action: 'addTask',
          task,
          type: types.join(', '),
          priority,
          timeSlot: timeSlots.join(', '),
          assignTo: checked.join(', '),
          deadline: fmtThai(deadline),
          dateAdded: today,
          startDate: fmtThai(startDate),
          status: 'ยังไม่เริ่ม',
          percent: '0%',
          addedBy: user.username
        });
        document.getElementById('aTask').value = '';
        document.getElementById('aStartDate').value = '';
        document.getElementById('aDeadline').value = '';
        clearMs('aType');
        document.getElementById('aPriority').value = '';
        clearMs('aTimeSlot');
        document.querySelectorAll('#assigneeGrid input').forEach(i => { i.checked = false; i.closest('.checkbox-item').classList.remove('checked'); });
        document.getElementById('assignError').style.display = 'none';
        closeConfirm();
        await loadRecentTasks();
        showSuccess('assignError', '✅ มอบหมายงานสำเร็จ');
      } catch (e) {
        btnConfirm.disabled = false;
        btnConfirm.innerHTML = '✅ ยืนยัน มอบหมายงาน';
        btnEdit.disabled = false;
        closeConfirm();
        showErr('assignError', '❌ บันทึกไม่สำเร็จ: ' + e.message);
      }
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = 'block';
      el.style.background = '#FEE2E2'; el.style.color = '#991B1B';
    }
    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = 'block';
      el.style.background = '#DCFCE7'; el.style.color = '#166534';
      setTimeout(() => el.style.display = 'none', 3000);
    }
    function todayStr() {
      const d = new Date();
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    function fmtThai(iso) {
      const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`;
    }
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    init();
  </script>
</body>
</html>
