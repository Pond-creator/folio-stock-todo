<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLIO STOCK - สรุปผล</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media print {
      .navbar, .admin-tabs, .no-print { display: none !important; }
      body { background: white !important; }
      .main { padding: 0 !important; }
      .card { box-shadow: none !important; border: 1px solid #E2E8F0 !important; }
      .progress-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .stat-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">📦 FOLIO STOCK</span>
    <div class="nav-right">
      <span class="nav-username" id="navUserName"></span>
      <span class="nav-role" id="navRole"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>
  <div class="admin-tabs" id="navTabs"></div>

  <div class="main">
    <div class="flex-between mb-24">
      <h1 class="page-title">📊 สรุปผลการดำเนินงาน</h1>
      <div style="display:flex;gap:8px" class="no-print">
        <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ บันทึก PDF</button>
        <button class="btn btn-outline btn-sm" onclick="exportSummary()">⬇️ Export CSV</button>
        <button class="btn btn-outline btn-sm" onclick="loadSummary()">🔄 รีเฟรช</button>
      </div>
    </div>

    <!-- stat cards -->
    <div class="stats-grid mb-24">
      <div class="stat-card blue">
        <div class="stat-label">งานทั้งหมด</div>
        <div class="stat-value" id="sTotal">-</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">เสร็จแล้ว</div>
        <div class="stat-value" id="sDone">-</div>
        <div class="stat-sub" id="sDonePct"></div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">ยังค้างอยู่</div>
        <div class="stat-value" id="sPending">-</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">ใกล้ Deadline</div>
        <div class="stat-value" id="sNear">-</div>
        <div class="stat-sub">≤ 3 วัน</div>
      </div>
      <div class="stat-card" style="border-left:4px solid #7F1D1D">
        <div class="stat-label" style="color:#7F1D1D">เกิน Deadline</div>
        <div class="stat-value" id="sOverdue" style="color:#7F1D1D">-</div>
        <div class="stat-sub">ยังไม่เสร็จ</div>
      </div>
    </div>

    <!-- overall progress -->
    <div class="card mb-24">
      <div class="card-header"><span class="card-title">ความคืบหน้ารวม</span></div>
      <div class="card-body">
        <div id="overallProgress" style="display:flex;align-items:center;gap:16px">
          <div class="progress-wrap" style="flex:1;height:16px">
            <div class="progress-bar p100" id="overallBar" style="width:0%"></div>
          </div>
          <span id="overallPct" style="font-size:20px;font-weight:700;color:#16A34A;min-width:60px">0%</span>
        </div>
        <div id="overallText" style="margin-top:8px;color:#64748B;font-size:14px"></div>
      </div>
    </div>

    <div class="grid-2 mb-24">
      <!-- by person -->
      <div class="card">
        <div class="card-header"><span class="card-title">สถิติรายคน</span></div>
        <div id="byPersonContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- by type -->
      <div class="card">
        <div class="card-header"><span class="card-title">สถิติตามประเภทงาน</span></div>
        <div id="byTypeContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js?v=2"></script>
  <script>
    let user, summaryData = null;

    async function init() {
      user = requireAuth('admin');
      if (!user) return;
      setNavUser(user);
      renderNav('summary');
      await loadSummary();
    }

    async function loadSummary() {
      document.getElementById('byPersonContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      document.getElementById('byTypeContainer').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const r = await apiGet({ action: 'getSummary' });
        if (!r.success) { alert('โหลดข้อมูลไม่สำเร็จ'); return; }
        summaryData = r;

        document.getElementById('sTotal').textContent = r.total;
        document.getElementById('sDone').textContent = r.done;
        document.getElementById('sPending').textContent = r.pending;
        document.getElementById('sNear').textContent    = r.nearDeadline;
        document.getElementById('sOverdue').textContent = r.overdue || 0;

        const pct = r.total > 0 ? Math.round(r.done / r.total * 100) : 0;
        document.getElementById('sDonePct').textContent = pct + '%';
        document.getElementById('overallBar').style.width = pct + '%';
        document.getElementById('overallPct').textContent = pct + '%';
        document.getElementById('overallText').textContent = `เสร็จแล้ว ${r.done} จาก ${r.total} งาน`;

        renderByPerson(r.byPerson);
        renderByType(r.byType);
      } catch (e) {
        document.getElementById('byPersonContainer').innerHTML = `<div class="alert alert-danger" style="margin:16px">${e.message}</div>`;
      }
    }

    function renderByPerson(data) {
      const entries = Object.entries(data).sort((a,b) => b[1].total - a[1].total);
      if (!entries.length) {
        document.getElementById('byPersonContainer').innerHTML = '<div class="empty-state"><span class="icon">👤</span><p>ไม่มีข้อมูล</p></div>';
        return;
      }
      const rows = entries.map(([name, s]) => {
        const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
        return `<tr>
          <td><span class="badge badge-planning">${escHtml(name)}</span></td>
          <td style="text-align:center;font-weight:700">${s.total}</td>
          <td style="text-align:center;color:#16A34A;font-weight:600">${s.done}</td>
          <td style="text-align:center;color:#D97706;font-weight:600">${s.pending}</td>
          <td style="min-width:120px">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="progress-wrap" style="flex:1">
                <div class="progress-bar ${pct===100?'p100':pct>=75?'p75':pct>=50?'p50':'p25'}" style="width:${pct}%"></div>
              </div>
              <span style="font-size:12px;color:#64748B;min-width:30px">${pct}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('byPersonContainer').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>ชื่อ</th><th style="text-align:center">รวม</th>
              <th style="text-align:center">เสร็จ</th><th style="text-align:center">ค้าง</th>
              <th>ความคืบหน้า</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function renderByType(data) {
      const entries = Object.entries(data).sort((a,b) => b[1].total - a[1].total);
      if (!entries.length) {
        document.getElementById('byTypeContainer').innerHTML = '<div class="empty-state"><span class="icon">📦</span><p>ไม่มีข้อมูล</p></div>';
        return;
      }
      const rows = entries.map(([type, s]) => {
        const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
        return `<tr>
          <td style="font-weight:500">${escHtml(type)}</td>
          <td style="text-align:center;font-weight:700">${s.total}</td>
          <td style="text-align:center;color:#16A34A;font-weight:600">${s.done}</td>
          <td style="text-align:center;color:#D97706;font-weight:600">${s.pending}</td>
          <td style="min-width:120px">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="progress-wrap" style="flex:1">
                <div class="progress-bar ${pct===100?'p100':pct>=50?'p50':'p25'}" style="width:${pct}%"></div>
              </div>
              <span style="font-size:12px;color:#64748B;min-width:30px">${pct}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('byTypeContainer').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>ประเภท</th><th style="text-align:center">รวม</th>
              <th style="text-align:center">เสร็จ</th><th style="text-align:center">ค้าง</th>
              <th>ความคืบหน้า</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function exportCSV(rows, filename) {
      const BOM = '﻿';
      const csv = BOM + rows.map(r =>
        r.map(v => {
          const s = String(v == null ? '' : v);
          return (s.includes(',') || s.includes('"') || s.includes('\n'))
            ? '"' + s.replace(/"/g, '""') + '"' : s;
        }).join(',')
      ).join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function todayFilename(prefix) {
      const d = new Date();
      const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return `${prefix}_${s}.csv`;
    }

    function exportSummary() {
      if (!summaryData) { alert('ยังไม่มีข้อมูล กรุณารอโหลดก่อน'); return; }
      const rows = [];
      // ภาพรวม
      rows.push(['=== ภาพรวม ===']);
      rows.push(['งานทั้งหมด', summaryData.total]);
      rows.push(['เสร็จแล้ว', summaryData.done]);
      rows.push(['ค้างอยู่', summaryData.pending]);
      rows.push(['ใกล้ Deadline', summaryData.nearDeadline]);
      const pct = summaryData.total > 0 ? Math.round(summaryData.done / summaryData.total * 100) : 0;
      rows.push(['ความคืบหน้ารวม', pct + '%']);
      rows.push([]);
      // รายคน
      rows.push(['=== สถิติรายคน ===']);
      rows.push(['ชื่อ','รวม','เสร็จ','ค้าง','%']);
      Object.entries(summaryData.byPerson).sort((a,b)=>b[1].total-a[1].total).forEach(([name,s]) => {
        const p = s.total > 0 ? Math.round(s.done/s.total*100) : 0;
        rows.push([name, s.total, s.done, s.pending, p+'%']);
      });
      rows.push([]);
      // ตามประเภท
      rows.push(['=== สถิติตามประเภทงาน ===']);
      rows.push(['ประเภท','รวม','เสร็จ','ค้าง','%']);
      Object.entries(summaryData.byType).sort((a,b)=>b[1].total-a[1].total).forEach(([type,s]) => {
        const p = s.total > 0 ? Math.round(s.done/s.total*100) : 0;
        rows.push([type, s.total, s.done, s.pending, p+'%']);
      });
      exportCSV(rows, todayFilename('สรุปผล'));
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    init();
  </script>
</body>
</html>
